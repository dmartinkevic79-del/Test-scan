<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Pro - SOFRINOKBT</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { 
            --primary-color: #00ffcc; 
            --error-color: #ff6b6b;
            --bg: #0f0f1a; 
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; 
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%); 
            color: white; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden;
        }

        /* Анимация вспышки при успехе */
        #flash-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 255, 204, 0.3); z-index: 1000; opacity: 0; 
            pointer-events: none; transition: opacity 0.1s; 
        }

        /* Контейнер сканера */
        #reader-wrapper { 
            position: relative; width: 320px; height: 320px; margin-top: 15px; 
            border-radius: 24px; overflow: hidden; background: #000; 
            display: flex; align-items: center; justify-content: center; 
            border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        #reader { width: 100% !important; height: 100% !important; border: none !important; }

        /* Кнопка старта поверх камеры */
        #start-btn { 
            position: absolute; z-index: 100; padding: 16px 32px; border-radius: 50px; 
            background: var(--primary-color); color: #000; border: none; 
            font-weight: bold; cursor: pointer; font-size: 1rem; 
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }

        /* Рамка прицела 280x280 */
        #custom-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 280px; height: 280px; border: 2px solid var(--primary-color); 
            z-index: 10; box-shadow: 0 0 0 500px rgba(0, 0, 0, 0.6); pointer-events: none; 
        }
        #laser { 
            position: absolute; width: 100%; height: 2px; background: var(--primary-color); 
            box-shadow: 0 0 15px var(--primary-color); animation: scanLine 2s infinite linear; 
        }
        @keyframes scanLine { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        /* Панель управления */
        .controls { 
            width: 92%; max-width: 360px; margin-top: 15px; padding: 18px; 
            background: var(--glass); backdrop-filter: blur(12px); 
            border-radius: 22px; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; 
        }
        .stat-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .stat-bar span { font-weight: bold; color: var(--primary-color); letter-spacing: 0.5px; }

        .reset-btn { 
            background: rgba(255, 107, 107, 0.15); border: 1px solid var(--error-color); 
            color: var(--error-color); padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; 
            cursor: pointer; font-weight: bold; 
        }

        /* Поле результата */
        .result-display { 
            padding: 14px; background: rgba(0, 0, 0, 0.4); border-radius: 12px; 
            margin-bottom: 12px; text-align: center; font-size: 1.2rem; font-weight: bold;
            color: var(--primary-color); border: 1px solid rgba(255,255,255,0.05); min-height: 1.5em;
        }
        .duplicate-active { color: var(--error-color); animation: shake 0.3s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

        select, .send-btn { 
            width: 100%; padding: 14px; margin: 6px 0; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); 
            color: white; font-weight: bold; font-size: 1rem; outline: none;
        }
        .send-btn { 
            background: linear-gradient(135deg, #00ffcc 0%, #0099ff 100%); 
            color: #000; border: none; margin-top: 10px; cursor: pointer; 
        }

        /* Список истории */
        .history-panel { width: 92%; max-width: 360px; margin-top: 15px; padding-bottom: 50px; }
        .history-item { 
            background: rgba(255, 255, 255, 0.06); padding: 14px; border-radius: 14px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; 
            border-left: 4px solid var(--primary-color); animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .del-btn { color: var(--error-color); font-size: 1.4rem; padding: 5px 12px; cursor: pointer; }

        .copyright { padding: 30px; font-size: 0.8rem; color: #fff; font-weight: bold; text-align: center; opacity: 0.8; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="flash-overlay"></div>

<div id="reader-wrapper">
    <button id="start-btn" onclick="startScanner()">ВКЛЮЧИТЬ КАМЕРУ</button>
    <div id="reader"></div>
    <div id="custom-overlay"><div id="laser"></div></div>
</div>

<div class="controls">
    <div class="stat-bar">
        <span id="route-label">МАРШРУТ №1</span>
        <span id="route-counter">0 шт.</span>
        <button class="reset-btn" onclick="resetCurrentRoute()">СБРОСИТЬ</button>
    </div>
    <div id="result" class="result-display">ОЖИДАНИЕ...</div>
    
    <select id="route-select" onchange="updateUI()">
        <option value="1">Маршрут №1</option>
        <option value="2">Маршрут №2</option>
        <option value="3">Маршрут №3</option>
        <option value="4">Маршрут №4</option>
        <option value="5">Маршрут №5</option>
        <option value="6">Маршрут №6</option>
        <option value="7">Маршрут №7</option>
        <option value="8">Маршрут №8</option>
        <option value="9">Маршрут №9</option>
    </select>
    
    <button id="send-btn" class="send-btn" onclick="sendToGoogle()">ОТПРАВИТЬ В ТАБЛИЦУ</button>
</div>

<div class="history-panel" id="history-list"></div>

<div class="copyright">DEVELOPED BY D. MARTINKEVICH FOR SOFRINOKBT</div>

<script>
    // --- ВСТАВЬТЕ ВАШУ ССЫЛКУ НИЖЕ ---
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyuszL59LKOfGaRL-iLdUG6X3sT-CP_etqCCMb5P3BvNFkavTQ9ThXcvzvtHnwPFScg_g/exec';
    
    let lastScannedId = null;
    let wakeLock = null;
    const html5QrCode = new Html5Qrcode("reader");

    // Загрузка данных (версия 4)
    let historyData = JSON.parse(localStorage.getItem('sofrinoHistoryV4')) || {1:[], 2:[], 3:[], 4:[], 5:[], 6:[], 7:[], 8:[], 9:[]};

    async function startScanner() {
        document.getElementById('start-btn').style.display = 'none';
        
        // 1. Блокировка выключения экрана
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) { console.log("WakeLock error"); }
        }

        // 2. Настройка камеры (30 FPS для лучшей чувствительности)
        const config = { 
            fps: 30, 
            qrbox: { width: 280, height: 280 },
            aspectRatio: 1.0
        };

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(err => {
            alert("Ошибка доступа к камере.");
            document.getElementById('start-btn').style.display = 'block';
        });
    }

    function onScanSuccess(decodedText) {
        // Извлекаем ID (3-й сегмент в строке через двоеточие)
        const parts = decodedText.split(':');
        const id = (parts.length >= 3 ? parts[2] : decodedText).trim();
        const r = document.getElementById('route-select').value;
        const resDisplay = document.getElementById('result');

        // Проверка на дубликат в текущем маршруте
        const isDuplicate = historyData[r].some(item => item.id === id);

        if (isDuplicate) {
            if (lastScannedId !== id) {
                playBeep('error');
                resDisplay.innerHTML = `ДУБЛИКАТ: ${id}`;
                resDisplay.classList.add('duplicate-active');
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                lastScannedId = id;
            }
            return;
        }

        // Если код новый
        lastScannedId = id;
        resDisplay.classList.remove('duplicate-active');
        resDisplay.innerText = id;
        
        playBeep('success'); 
        triggerFlash();
        if (navigator.vibrate) navigator.vibrate(100);
        
        historyData[r].unshift({ id: id, time: new Date().toLocaleTimeString().slice(0, 5) });
        saveAndRefresh();
    }

    function saveAndRefresh() {
        localStorage.setItem('sofrinoHistoryV4', JSON.stringify(historyData));
        updateUI();
    }

    function updateUI() {
        const r = document.getElementById('route-select').value;
        document.getElementById('route-label').innerText = `МАРШРУТ №${r}`;
        document.getElementById('route-counter').innerText = `${historyData[r].length} шт.`;
        
        const list = document.getElementById('history-list');
        list.innerHTML = historyData[r].map((item, idx) => `
            <div class="history-item">
                <span><b style="font-size:1.1rem">${item.id}</b><br><small style="opacity:0.5">время: ${item.time}</small></span>
                <span class="del-btn" onclick="deleteItem(${idx})">❌</span>
            </div>
        `).join('');
    }

    function deleteItem(idx) {
        if(confirm("Удалить этот код из списка?")) {
            const r = document.getElementById('route-select').value;
            historyData[r].splice(idx, 1);
            saveAndRefresh();
        }
    }

    function resetCurrentRoute() {
        if(confirm("Полностью очистить список этого маршрута?")) {
            const r = document.getElementById('route-select').value;
            historyData[r] = [];
            lastScannedId = null;
            saveAndRefresh();
            document.getElementById('result').innerText = "ОЖИДАНИЕ...";
        }
    }

    function playBeep(type) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.05, ctx.currentTime);
            
            if (type === 'success') {
                osc.frequency.setValueAtTime(1000, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } else {
                // Низкий двойной сигнал для дублей
                osc.frequency.setValueAtTime(250, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.2);
                setTimeout(() => {
                    const osc2 = ctx.createOscillator();
                    osc2.frequency.setValueAtTime(200, ctx.currentTime);
                    osc2.connect(gain);
                    osc2.start(); osc2.stop(ctx.currentTime + 0.2);
                }, 250);
            }
            osc.connect(gain); gain.connect(ctx.destination);
        } catch(e) {}
    }

    function triggerFlash() {
        const f = document.getElementById('flash-overlay');
        f.style.opacity = '1'; setTimeout(() => f.style.opacity = '0', 100);
    }

    function sendToGoogle() {
        const r = document.getElementById('route-select').value;
        const codes = historyData[r].map(i => i.id);
        
        if (codes.length === 0) return alert("Список пуст!");

        const btn = document.getElementById('send-btn');
        btn.innerText = "ОТПРАВКА..."; btn.disabled = true;

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ value: codes.join(', '), route: r })
        }).then(() => {
            alert("Маршрут №" + r + " успешно отправлен!");
            btn.innerText = "ОТПРАВИТЬ В ТАБЛИЦУ"; btn.disabled = false;
        }).catch(err => {
            alert("Ошибка соединения!");
            btn.innerText = "ОТПРАВИТЬ В ТАБЛИЦУ"; btn.disabled = false;
        });
    }

    // Первичная отрисовка
    updateUI();
</script>
</body>
</html>
