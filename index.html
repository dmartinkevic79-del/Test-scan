<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scanner iOS Glass</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --glass-bg: rgba(28, 28, 30, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-green: #30d158;
            --accent-red: #ff453a;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--ios-bg);
            color: white;
            margin: 0;
            padding: 20px 16px;
            overflow-x: hidden;
        }

        /* Оболочка сканера */
        .scanner-wrap {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            background: #000;
            aspect-ratio: 1/1;
        }

        #reader { width: 100% !important; border: none !important; }

        /* ИСПРАВЛЕННЫЙ ЛАЗЕР: Теперь он внутри квадрата */
        .laser-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 250px; /* Размер qrbox */
            height: 250px;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        .laser-line {
            width: 100%;
            height: 2px;
            background: var(--accent-red);
            box-shadow: 0 0 15px var(--accent-red);
            position: absolute;
            animation: scanAnim 3.5s infinite ease-in-out;
        }

        @keyframes scanAnim {
            0%, 100% { top: 0%; opacity: 0.3; }
            50% { top: 100%; opacity: 1; }
        }

        /* Стеклянные элементы */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
        }

        select {
            width: 100%; background: transparent; color: white;
            border: none; font-size: 18px; font-weight: 600; outline: none;
        }

        .ios-btn {
            background: var(--accent-green);
            color: black; border: none; padding: 18px;
            border-radius: 16px; font-size: 17px; font-weight: 700;
            width: 100%; cursor: pointer; transition: 0.3s;
        }

        .ios-btn:disabled { background: #3a3a3c; color: #8e8e93; }

        #status {
            text-align: center; font-size: 20px; font-weight: 700;
            margin: 15px 0; min-height: 24px; color: var(--accent-green);
        }

        .history-card {
            background: rgba(255,255,255,0.05);
            padding: 12px; border-radius: 12px; margin-bottom: 8px;
            display: flex; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="glass">
        <select id="route-select">
            <option value="Маршрут 1">Маршрут 1</option>
            <option value="Маршрут 8">Маршрут 8</option>
            <option value="Маршрут 9">Маршрут 9</option>
            </select>
    </div>

    <div class="scanner-wrap">
        <div id="reader"></div>
        <div class="laser-container">
            <div class="laser-line"></div>
        </div>
    </div>

    <div id="status">Готов</div>

    <button class="ios-btn" id="submit-btn" onclick="sendData()">
        Отправить данные (0)
    </button>

    <div style="margin-top: 20px;">
        <h4 style="color: #8e8e93; margin-left: 10px;">ИСТОРИЯ</h4>
        <div id="history-box"></div>
    </div>

<script>
    let historyData = {};
    for(let i=1; i<=1000; i++) { historyData[`Маршрут ${i}`] = []; } // Резерв под любые номера
    let lastId = null;
    let isLocked = false;

    function updateUI() {
        const r = document.getElementById('route-select').value;
        const box = document.getElementById('history-box');
        box.innerHTML = '';
        historyData[r].forEach(item => {
            box.innerHTML += `<div class="history-card"><span>${item.id}</span><span style="color:#8e8e93">${item.time}</span></div>`;
        });
        const btn = document.getElementById('submit-btn');
        btn.textContent = `Отправить ${r} (${historyData[r].length})`;
        btn.disabled = historyData[r].length === 0 || isLocked;
    }

    function onScanSuccess(text) {
        if (isLocked) return;

        // Фильтрация ID (из $1:1:5033082853:50189480 достаем 5033082853)
        let id = text.trim();
        if (id.includes(':')) {
            const parts = id.split(':');
            if (parts.length >= 3) id = parts[2];
        }

        const r = document.getElementById('route-select').value;
        const status = document.getElementById('status');

        if (historyData[r].some(i => i.id === id)) {
            if (lastId !== id) {
                status.style.color = 'var(--accent-red)';
                status.textContent = 'ДУБЛИКАТ';
                navigator.vibrate([100, 50, 100]);
                lastId = id;
            }
            return;
        }

        lastId = id;
        status.style.color = 'var(--accent-green)';
        status.textContent = id;
        navigator.vibrate(40);

        historyData[r].unshift({ id: id, time: new Date().toLocaleTimeString().slice(0,5) });
        updateUI();
    }

    async function sendData() {
        const r = document.getElementById('route-select').value;
        const data = historyData[r];
        const status = document.getElementById('status');
        
        isLocked = true;
        updateUI();
        status.textContent = 'Сохранение...';

        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyYdqLYYn0z6m8UgpS6mpWtw199xB0Eqbm6Oc2fI8haklkhd3ajBuI4Tu_OHvaopwb0/exec';

        try {
            const resp = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // Это поможет избежать ошибок CORS
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ route: r, data: data })
            });

            // Так как no-cors не дает прочитать ответ, считаем успех если нет ошибки catch
            historyData[r] = [];
            lastId = null;
            status.textContent = 'Успешно отправлено!';
            navigator.vibrate([50, 50, 50]);
        } catch (e) {
            alert('Ошибка сети! Проверьте интернет.');
        } finally {
            isLocked = false;
            updateUI();
        }
    }

    const scanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 });
    scanner.render(onScanSuccess);

    document.getElementById('route-select').addEventListener('change', updateUI);
</script>
</body>
</html>
