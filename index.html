<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WB Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg-color: #000;
            --accent-green: #2ecc71;
            --danger-outline: #555;
            --text-main: #ffffff;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Обертка для сканера и лазера */
        .scanner-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 28px;
            overflow: hidden;
            border: 2px solid #222;
        }

        #reader { 
            width: 100%; 
            background: #050505; 
        }

        /* Лазерная линия */
        .scanner-laser {
            position: absolute;
            top: 25%;
            left: 15%;
            width: 70%;
            height: 2px;
            background: var(--accent-green);
            box-shadow: 0 0 15px 2px var(--accent-green);
            z-index: 10;
            display: none;
            pointer-events: none; /* Чтобы лазер не перекрывал фокус камеры */
            animation: scanning 2s infinite ease-in-out;
        }

        @keyframes scanning {
            0% { top: 25%; }
            50% { top: 75%; }
            100% { top: 25%; }
        }

        /* Прозрачно-зеленая вспышка на весь экран */
        #flash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(46, 204, 113, 0.35); /* Полупрозрачный зеленый */
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .flash-active { opacity: 1 !important; }

        /* Уведомление о дубликате */
        #status-overlay {
            position: fixed;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #f1c40f;
            color: #000;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 18px;
            z-index: 10000;
            display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        
        .controls { display: flex; flex-direction: column; gap: 14px; margin-top: 25px; }
        
        button { 
            padding: 18px; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; 
            font-size: 16px; transition: all 0.2s ease; 
            text-transform: uppercase; position: relative;
        }
        button:active { transform: scale(0.97); }

        .btn-start { background: linear-gradient(135deg, #9b41cc, #6e2796); color: #fff; box-shadow: 0 4px 15px rgba(155, 65, 204, 0.3); }
        .btn-copy { background: linear-gradient(135deg, #2ecc71, #27ae60); color: #fff; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); }
        .btn-clear { background: transparent; border: 2px solid var(--danger-outline); color: #888; margin-top: 10px; }
        .btn-torch { background: #333; color: #fff; display: none; }
        
        #list-container { margin-top: 25px; background: #111; border-radius: 24px; padding: 20px; border: 1px solid #222; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 1px solid #222; }
        .count-value { color: var(--accent-green); font-size: 32px; font-weight: 900; }
        
        ul { list-style: none; padding: 0; margin-top: 15px; }
        li { padding: 14px 0; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .code-text { font-size: 18px; font-weight: 600; color: #eee; }
        .time-text { font-size: 12px; color: #555; }

        .footer { text-align: center; font-size: 10px; color: #333; margin: 30px 0; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="flash-overlay"></div>
    
    <div id="status-overlay">⚠️ УЖЕ В СПИСКЕ</div>

    <div class="scanner-wrapper">
        <div id="reader"></div>
        <div id="laser" class="scanner-laser"></div>
    </div>

    <div class="controls">
        <button id="start-btn" class="btn-start" onclick="initScanner()">🚀 ЗАПУСТИТЬ СКАНЕР</button>
        <button id="torch-button" class="btn-torch" onclick="toggleTorch()">🔦 ФОНАРИК</button>
        <button class="btn-copy" onclick="copyToClipboard()">📋 КОПИРОВАТЬ СПИСОК</button>
        <button class="btn-clear" onclick="clearList()">🗑️ ОЧИСТИТЬ СПИСОК</button>
    </div>

    <div id="list-container">
        <div class="status-bar">
            <span style="color: #666; font-weight: 700;">СЧИТАНО</span>
            <span id="count" class="count-value">0</span>
        </div>
        <ul id="scanned-codes"></ul>
    </div>

    <div class="footer">Developed by D. Martinkevich for SofrinoKBT</div>

    <script>
        let codes = JSON.parse(localStorage.getItem('wb_codes_v8') || '[]');
        let html5QrCode = null;
        let lastScanTime = 0;
        const SCAN_DELAY = 2200; 

        window.onload = () => renderList();

        function showDuplicateWarning() {
            const el = document.getElementById('status-overlay');
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 1500);
        }

        // Функция зеленой вспышки экрана
        function triggerVisualFeedback() {
            const flash = document.getElementById('flash-overlay');
            flash.classList.add('flash-active');
            setTimeout(() => { flash.classList.remove('flash-active'); }, 200);
        }

        async function initScanner() {
            if (html5QrCode) { try { await html5QrCode.stop(); } catch(e) {} }
            html5QrCode = new Html5Qrcode("reader");
            
            const config = {
                fps: 25,
                qrbox: 250, // Только одно значение делает рамку строгим квадратом
                aspectRatio: 1.0
            };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    (text) => {
                        const now = Date.now();
                        if (now - lastScanTime < SCAN_DELAY) return;

                        let match = text.match(/\d{10,}/);
                        let processed = match ? match[0] : text;

                        if (codes.some(c => c.text === processed)) {
                            showDuplicateWarning();
                            lastScanTime = now;
                            return;
                        }

                        codes.push({ 
                            text: processed, 
                            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                        });
                        localStorage.setItem('wb_codes_v8', JSON.stringify(codes));
                        
                        triggerVisualFeedback(); // Запускаем вспышку
                        renderList();
                        new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3').play().catch(()=>{});
                        lastScanTime = now;
                    }
                );
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('laser').style.display = 'block'; // Показываем лазер
                setTimeout(checkTorch, 1000);
            } catch (err) {
                alert("Ошибка камеры. Убедитесь, что сайт открыт через HTTPS.");
            }
        }

        function renderList() {
            const list = document.getElementById('scanned-codes');
            list.innerHTML = '';
            [...codes].reverse().forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `<span class="code-text">${item.text}</span><span class="time-text">${item.time}</span>`;
                list.appendChild(li);
            });
            document.getElementById('count').innerText = codes.length;
        }

        function copyToClipboard() {
            if (!codes.length) return;
            const body = codes.map(c => c.text).join('\n');
            navigator.clipboard.writeText(body).then(() => { alert("Скопировано!"); });
        }

        function clearList() {
            if (confirm("Удалить все данные?")) {
                codes = [];
                localStorage.removeItem('wb_codes_v8');
                renderList();
            }
        }

        function checkTorch() {
            try {
                const track = html5QrCode.getRunningTrackCapabilities();
                if (track && track.torch) document.getElementById('torch-button').style.display = 'block';
            } catch(e) {}
        }

        async function toggleTorch() {
            const btn = document.getElementById('torch-button');
            const isOff = btn.innerText.includes("ФОНАРИК");
            try {
                await html5QrCode.applyVideoConstraints({ advanced: [{ torch: isOff }] });
                btn.innerText = isOff ? "❌ ВЫКЛЮЧИТЬ" : "🔦 ФОНАРИК";
            } catch(e) {}
        }
    </script>
</body>
</html>
