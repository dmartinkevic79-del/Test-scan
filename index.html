<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Pro - SOFRINOKBT</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary-color: #00ffcc; --bg: #0f0f1a; }
        body { margin: 0; padding: 0; font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        #flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 255, 128, 0.4); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.1s; }
        
        #reader-wrapper { position: relative; width: 320px; height: 320px; margin-top: 15px; border-radius: 20px; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.1); }
        #reader { width: 100% !important; height: 100% !important; }
        
        #start-btn { position: absolute; z-index: 100; padding: 15px 30px; border-radius: 50px; background: var(--primary-color); color: #000; border: none; font-weight: bold; cursor: pointer; }

        #custom-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 260px; height: 260px; border: 2px solid var(--primary-color); z-index: 10; box-shadow: 0 0 0 500px rgba(0, 0, 0, 0.6); pointer-events: none; }
        #laser { position: absolute; width: 100%; height: 2px; background: var(--primary-color); box-shadow: 0 0 15px var(--primary-color); animation: scanLine 2s infinite linear; }
        @keyframes scanLine { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        .controls { width: 92%; max-width: 360px; margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; }
        .stat-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; color: var(--primary-color); }
        
        .reset-btn { background: rgba(255, 107, 107, 0.2); border: 1px solid #ff6b6b; color: #ff6b6b; padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; }
        .result-display { padding: 12px; background: rgba(0, 0, 0, 0.5); border-radius: 12px; margin-bottom: 10px; text-align: center; font-size: 1.1rem; color: var(--primary-color); min-height: 1.2em; font-weight: bold; }
        
        select, .send-btn { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-weight: bold; font-size: 1rem; }
        .send-btn { background: linear-gradient(135deg, #00ffcc, #0099ff); color: #000; border: none; margin-top: 10px; }

        .history-panel { width: 92%; max-width: 360px; margin-top: 15px; padding-bottom: 40px; }
        .history-item { background: rgba(255, 255, 255, 0.07); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary-color); }
        .del-btn { color: #ff6b6b; font-size: 1.3rem; padding: 5px 10px; cursor: pointer; }

        .copyright { padding: 20px; font-size: 0.8rem; color: #fff; font-weight: bold; text-align: center; opacity: 0.9; }
    </style>
</head>
<body>

<div id="flash-overlay"></div>

<div id="reader-wrapper">
    <button id="start-btn" onclick="startScanner()">ВКЛЮЧИТЬ КАМЕРУ</button>
    <div id="reader"></div>
    <div id="custom-overlay"><div id="laser"></div></div>
</div>

<div class="controls">
    <div class="stat-bar">
        <span id="route-label">МАРШРУТ №1</span>
        <span id="route-counter">0 шт.</span>
        <button class="reset-btn" onclick="resetCurrentRoute()">СБРОСИТЬ</button>
    </div>
    <div id="result" class="result-display">ОЖИДАНИЕ...</div>
    <select id="route-select" onchange="updateUI()">
        <option value="1">Маршрут №1</option><option value="2">Маршрут №2</option>
        <option value="3">Маршрут №3</option><option value="4">Маршрут №4</option>
        <option value="5">Маршрут №5</option><option value="6">Маршрут №6</option>
        <option value="7">Маршрут №7</option><option value="8">Маршрут №8</option>
        <option value="9">Маршрут №9</option>
    </select>
    <button id="send-btn" class="send-btn" onclick="sendToGoogle()">ОТПРАВИТЬ В ТАБЛИЦУ</button>
</div>

<div class="history-panel" id="history-list"></div>
<div class="copyright">DEVELOPED BY D. MARTINKEVICH FOR SOFRINOKBT</div>

<script>
    const GOOGLE_SCRIPT_URL = 'ВАША_НОВАЯ_ССЫЛКА_ТУТ';
    let lastScannedId = null;
    let wakeLock = null;
    const html5QrCode = new Html5Qrcode("reader");

    // Инициализация данных из памяти телефона
    let historyData = JSON.parse(localStorage.getItem('sofrinoHistoryV2')) || {1:[], 2:[], 3:[], 4:[], 5:[], 6:[], 7:[], 8:[], 9:[]};

    async function startScanner() {
        document.getElementById('start-btn').style.display = 'none';
        
        // Блокируем выключение экрана
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
        }

        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 20, qrbox: { width: 250, height: 250 } }, 
            onScanSuccess
        ).catch(err => {
            alert("Ошибка камеры! Проверьте разрешения.");
            document.getElementById('start-btn').style.display = 'block';
        });
    }

    function onScanSuccess(decodedText) {
        const parts = decodedText.split(':');
        const id = (parts.length >= 3 ? parts[2] : decodedText).trim();
        const r = document.getElementById('route-select').value;

        // Строгая проверка на дубликаты
        const exists = historyData[r].some(item => item.id === id);

        if (lastScannedId !== id && !exists) {
            lastScannedId = id;
            playBeep(); triggerFlash();
            
            historyData[r].unshift({ id: id, time: new Date().toLocaleTimeString() });
            saveAndRefresh();
            
            document.getElementById('result').innerText = id;
            if (navigator.vibrate) navigator.vibrate(100);
        }
    }

    function saveAndRefresh() {
        localStorage.setItem('sofrinoHistoryV2', JSON.stringify(historyData));
        updateUI();
    }

    function updateUI() {
        const r = document.getElementById('route-select').value;
        document.getElementById('route-label').innerText = `МАРШРУТ №${r}`;
        document.getElementById('route-counter').innerText = `${historyData[r].length} шт.`;
        
        const list = document.getElementById('history-list');
        list.innerHTML = historyData[r].map((item, idx) => `
            <div class="history-item">
                <span><b>${item.id}</b> <br><small style="opacity:0.6">${item.time}</small></span>
                <span class="del-btn" onclick="deleteItem(${idx})">❌</span>
            </div>
        `).join('');
    }

    function deleteItem(idx) {
        const r = document.getElementById('route-select').value;
        historyData[r].splice(idx, 1);
        saveAndRefresh();
    }

    function resetCurrentRoute() {
        if(confirm("Удалить ВСЕ отсканированные коды для этого маршрута?")) {
            const r = document.getElementById('route-select').value;
            historyData[r] = [];
            lastScannedId = null;
            saveAndRefresh();
            document.getElementById('result').innerText = "ОЖИДАНИЕ...";
        }
    }

    function playBeep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        } catch(e) {}
    }

    function triggerFlash() {
        const f = document.getElementById('flash-overlay');
        f.style.opacity = '1'; setTimeout(() => f.style.opacity = '0', 100);
    }

    function sendToGoogle() {
        const r = document.getElementById('route-select').value;
        const codes = historyData[r].map(i => i.id);
        
        if (codes.length === 0) return alert("Список пуст!");

        const btn = document.getElementById('send-btn');
        btn.innerText = "ОТПРАВЛЯЮ..."; btn.disabled = true;

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ value: codes.join(', '), route: r })
        }).then(() => {
            alert("Данные успешно отправлены в таблицу!");
            btn.innerText = "ОТПРАВИТЬ В ТАБЛИЦУ"; btn.disabled = false;
        }).catch(err => {
            alert("Ошибка сети!");
            btn.disabled = false;
        });
    }

    updateUI();
</script>
</body>
</html>
