<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WB Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg-color: #000;
            --accent-blue: #00d4ff;
            --accent-green: #2ecc71;
            --accent-warning: rgba(255, 165, 0, 0.8);
            --text-main: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.12);
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .scanner-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            background: #050505;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        #reader { width: 100%; }

        /* Синий лазер — стал чуть плотнее */
        .scanner-laser {
            position: absolute;
            top: 25%;
            left: 15%;
            width: 70%;
            height: 2px;
            background: rgba(0, 212, 255, 0.5); 
            box-shadow: 0 0 15px 3px rgba(0, 212, 255, 0.4); 
            z-index: 10;
            display: none;
            pointer-events: none;
            animation: scanning 3.5s infinite ease-in-out; 
        }

        @keyframes scanning {
            0% { top: 25%; }
            50% { top: 75%; }
            100% { top: 25%; }
        }

        /* Уведомление "УЖЕ В СПИСКЕ" в стиле Глассморфизм */
        #status-overlay {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(255, 150, 0, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 150, 0, 0.3);
            color: #fff;
            padding: 20px 40px;
            border-radius: 25px;
            font-weight: 800;
            font-size: 18px;
            z-index: 10000;
            display: none;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px rgba(255, 150, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 1px;
        }
        #status-overlay.active { display: block; transform: translate(-50%, -50%) scale(1); }

        /* Анимированные кнопки */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .controls { display: flex; flex-direction: column; gap: 16px; margin-top: 25px; }
        
        button { 
            padding: 20px; 
            border-radius: 20px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 15px; 
            transition: all 0.3s ease; 
            text-transform: uppercase; 
            position: relative;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #fff;
            background-size: 200% 200%;
            animation: gradientShift 5s infinite ease;
        }

        button:active { transform: scale(0.96); filter: brightness(1.2); }

        .btn-start { 
            background-image: linear-gradient(135deg, #6e2796, #a64dff, #6e2796);
            box-shadow: 0 8px 25px rgba(110, 39, 150, 0.3);
        }

        .btn-copy { 
            background-image: linear-gradient(135deg, #1e8449, #2ecc71, #1e8449);
            box-shadow: 0 8px 25px rgba(30, 132, 73, 0.3);
        }

        .btn-clear { 
            background: rgba(255, 255, 255, 0.05);
            color: #888;
            animation: none; 
        }

        /* Список */
        #list-container { 
            margin-top: 25px; 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 28px; 
            padding: 24px; 
            border: 1px solid var(--glass-border);
        }

        .status-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .count-value { color: var(--accent-green); font-size: 34px; font-weight: 900; }
        
        ul { list-style: none; padding: 0; margin-top: 15px; }
        li { padding: 18px 0; border-top: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .code-text { font-size: 18px; font-weight: 600; color: #eee; }
        .time-text { font-size: 12px; color: #555; }

        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 212, 255, 0.2); 
            z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.1s;
        }
        .flash-active { opacity: 1 !important; }

        .footer { 
            text-align: center; font-size: 11px; color: #aaa; 
            margin: 45px 0 25px 0; text-transform: uppercase; 
            letter-spacing: 2px; font-weight: 700;
        }
    </style>
</head>
<body>
    <div id="flash-overlay"></div>
    <div id="status-overlay">⚠️ УЖЕ В СПИСКЕ</div>

    <div class="scanner-wrapper">
        <div id="reader"></div>
        <div id="laser" class="scanner-laser"></div>
    </div>

    <div class="controls">
        <button id="start-btn" class="btn-start" onclick="initScanner()">🚀 ЗАПУСТИТЬ СКАНЕР</button>
        <button id="torch-button" style="display:none; background: rgba(255,255,255,0.1);" onclick="toggleTorch()">🔦 ФОНАРИК</button>
        <button class="btn-copy" onclick="copyToClipboard()">📋 КОПИРОВАТЬ СПИСОК</button>
        <button class="btn-clear" onclick="clearList()">🗑️ ОЧИСТИТЬ СПИСОК</button>
    </div>

    <div id="list-container">
        <div class="status-bar">
            <span style="color: #666; font-weight: 800; font-size: 12px;">ОБРАБОТАНО КОДОВ</span>
            <span id="count" class="count-value">0</span>
        </div>
        <ul id="scanned-codes"></ul>
    </div>

    <div class="footer">DEVELOPED BY D. MARTINKEVICH FOR SOFRINOKBT</div>

    <script>
        // Используем единый ключ для стабильности
        const STORAGE_KEY = 'wb_scanner_final_data';
        let codes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        let html5QrCode = null;
        let lastScanTime = 0;
        const SCAN_DELAY = 2200; 

        window.onload = () => renderList();

        function showDuplicateWarning() {
            const el = document.getElementById('status-overlay');
            el.classList.add('active');
            setTimeout(() => { el.classList.remove('active'); }, 2000);
        }

        function triggerVisualFeedback() {
            const flash = document.getElementById('flash-overlay');
            flash.classList.add('flash-active');
            setTimeout(() => { flash.classList.remove('flash-active'); }, 150);
        }

        async function initScanner() {
            if (html5QrCode) { try { await html5QrCode.stop(); } catch(e) {} }
            html5QrCode = new Html5Qrcode("reader");
            
            const config = {
                fps: 25,
                qrbox: function(viewfinderWidth, viewfinderHeight) {
                    let boxSize = Math.floor(Math.min(viewfinderWidth, viewfinderHeight) * 0.75);
                    return { width: boxSize, height: boxSize };
                },
                aspectRatio: 1.0
            };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    (text) => {
                        const now = Date.now();
                        if (now - lastScanTime < SCAN_DELAY) return;

                        // Очистка и нормализация текста
                        let rawText = text.trim();
                        let match = rawText.match(/\d{10,}/);
                        let processed = match ? match[0] : rawText;

                        // Исправленная проверка дубликатов
                        if (codes.some(c => c.text === processed)) {
                            showDuplicateWarning();
                            lastScanTime = now;
                            return;
                        }

                        codes.push({ 
                            text: processed, 
                            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
                        });
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(codes));
                        
                        triggerVisualFeedback();
                        renderList();
                        new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3').play().catch(()=>{});
                        lastScanTime = now;
                    }
                );
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('laser').style.display = 'block';
                setTimeout(checkTorch, 1000);
            } catch (err) {
                alert("Ошибка: " + err);
            }
        }

        function renderList() {
            const list = document.getElementById('scanned-codes');
            list.innerHTML = '';
            // Создаем копию и переворачиваем для отображения новых сверху
            [...codes].reverse().forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `<span class="code-text">${item.text}</span><span class="time-text">${item.time}</span>`;
                list.appendChild(li);
            });
            document.getElementById('count').innerText = codes.length;
        }

        function copyToClipboard() {
            if (!codes.length) return;
            const body = codes.map(c => c.text).join('\n');
            navigator.clipboard.writeText(body).then(() => { alert("Скопировано в буфер!"); });
        }

        function clearList() {
            if (confirm("Удалить весь список?")) {
                codes = [];
                localStorage.removeItem(STORAGE_KEY);
                renderList();
            }
        }

        function checkTorch() {
            try {
                const track = html5QrCode.getRunningTrackCapabilities();
                if (track && track.torch) document.getElementById('torch-button').style.display = 'block';
            } catch(e) {}
        }

        async function toggleTorch() {
            const btn = document.getElementById('torch-button');
            const isOff = btn.innerText.includes("ФОНАРИК");
            try {
                await html5QrCode.applyVideoConstraints({ advanced: [{ torch: isOff }] });
                btn.innerText = isOff ? "❌ ВЫКЛЮЧИТЬ" : "🔦 ФОНАРИК";
            } catch(e) {}
        }
    </script>
</body>
</html>
