<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WB Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg-color: #000;
            --success-flash: #1b6e27; /* Более темный зеленый для вспышки */
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: #fff; 
            margin: 0; 
            padding: 20px; 
            transition: background 0.15s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        #reader { 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
            border-radius: 24px; 
            overflow: hidden; 
            border: 2px solid #222; 
            background: #0a0a0a; 
        }

        /* Уведомление о дубликате */
        #status-msg {
            text-align: center;
            height: 24px;
            margin: 10px 0;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 1px;
            color: #ffcc00;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .controls { display: flex; flex-direction: column; gap: 16px; }
        
        /* Кнопки с затемненными цветами */
        button { 
            padding: 18px; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; 
            font-size: 16px; transition: all 0.1s ease; 
            text-transform: uppercase; position: relative; top: 0;
        }
        button:active { top: 4px; box-shadow: 0 2px 0 rgba(0,0,0,0.5) !important; }

        .btn-start { 
            background: linear-gradient(145deg, #5a2770, #3d1a4c); color: #e0e0e0; 
            box-shadow: 0 6px 0 #2b1236;
        }
        .btn-copy { 
            background: linear-gradient(145deg, #14521e, #0e3a15); color: #e0e0e0;
            box-shadow: 0 6px 0 #08210c;
        }
        .btn-clear { 
            background: linear-gradient(145deg, #75221c, #521813); color: #e0e0e0;
            box-shadow: 0 6px 0 #310e0b;
        }
        .btn-torch { 
            background: linear-gradient(145deg, #857000, #5c4e00); color: #000; 
            display: none; box-shadow: 0 6px 0 #3b3200;
        }
        
        #list-container { margin-top: 20px; background: #141416; border-radius: 24px; padding: 20px; margin-bottom: 50px; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; }
        .count-value { color: #1e7d2c; font-size: 28px; font-weight: 800; }
        
        ul { list-style: none; padding: 0; margin-top: 15px; }
        li { padding: 12px 0; border-top: 1px solid #1f1f22; display: flex; flex-direction: column; }
        .code-text { font-size: 18px; font-weight: 600; color: #d1d1d1; }
        .time-text { font-size: 12px; color: #555; margin-top: 4px; }

        .footer {
            text-align: center;
            font-size: 10px;
            color: #333;
            margin-top: 20px;
            padding-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .flash-active { background-color: var(--success-flash) !important; }
    </style>
</head>
<body>
    <div id="reader"></div>
    <div id="status-msg">УЖЕ В СПИСКЕ</div>

    <div class="controls">
        <button id="start-btn" class="btn-start" onclick="initScanner()">🚀 ЗАПУСТИТЬ СКАНЕР</button>
        <button id="torch-button" class="btn-torch" onclick="toggleTorch()">🔦 ФОНАРИК</button>
        <button class="btn-copy" onclick="copyToClipboard()">📋 КОПИРОВАТЬ СПИСОК</button>
        <button class="btn-clear" onclick="clearList()">🗑️ ОЧИСТИТЬ СПИСОК</button>
    </div>

    <div id="list-container">
        <div class="status-bar">
            <span style="color: #444; font-weight: 600;">СЧИТАНО КОДОВ</span>
            <span id="count" class="count-value">0</span>
        </div>
        <ul id="scanned-codes"></ul>
    </div>

    <div class="footer">
        Developed by D. Martinkevich for SofrinoKBT
    </div>

    <script>
        let codes = JSON.parse(localStorage.getItem('wb_codes_v6') || '[]');
        let html5QrCode = null;
        let lastScanTime = 0;
        const SCAN_DELAY = 2500; 

        window.onload = () => renderList();

        function showStatus(text, color) {
            const el = document.getElementById('status-msg');
            el.innerText = text;
            el.style.color = color;
            el.style.opacity = '1';
            setTimeout(() => { el.style.opacity = '0'; }, 1500);
        }

        async function initScanner() {
            if (html5QrCode) { try { await html5QrCode.stop(); } catch(e) {} }
            html5QrCode = new Html5Qrcode("reader");
            
            const config = {
                fps: 30,
                qrbox: { width: 320, height: 160 },
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    (text) => {
                        const now = Date.now();
                        if (now - lastScanTime < SCAN_DELAY) return;

                        let match = text.match(/\d{10,}/);
                        let processed = match ? match[0] : text;

                        if (codes.some(c => c.text === processed)) {
                            showStatus("УЖЕ В СПИСКЕ", "#ffcc00");
                            lastScanTime = now;
                            return;
                        }

                        const dateObj = new Date();
                        codes.push({ 
                            text: processed, 
                            time: dateObj.toLocaleTimeString(),
                            date: dateObj.toLocaleDateString()
                        });
                        localStorage.setItem('wb_codes_v6', JSON.stringify(codes));
                        
                        triggerVisualFeedback();
                        renderList();
                        new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3').play().catch(()=>{});
                        
                        lastScanTime = now;
                    }
                );
                document.getElementById('start-btn').style.display = 'none';
                setTimeout(checkTorch, 1000);
            } catch (err) {
                alert("Ошибка камеры: убедитесь, что используется HTTPS и доступ разрешен.");
            }
        }

        function triggerVisualFeedback() {
            document.body.classList.add('flash-active');
            setTimeout(() => { document.body.classList.remove('flash-active'); }, 150);
        }

        function renderList() {
            const list = document.getElementById('scanned-codes');
            list.innerHTML = '';
            [...codes].reverse().forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="code-text">${item.text}</span>
                    <span class="time-text">🕒 ${item.date} | ${item.time}</span>
                `;
                list.appendChild(li);
            });
            document.getElementById('count').innerText = codes.length;
        }

        function copyToClipboard() {
            if (!codes.length) return;
            const exportDate = new Date().toLocaleString();
            const header = `ОТЧЕТ SOFRINOKBT\nВыгрузка: ${exportDate}\n-------------------\n`;
            const body = codes.map(c => `${c.text} (${c.date} ${c.time})`).join('\n');
            navigator.clipboard.writeText(header + body).then(() => { alert("Отчет скопирован!"); });
        }

        function clearList() {
            if (confirm("Удалить все данные?")) {
                codes = [];
                localStorage.removeItem('wb_codes_v6');
                renderList();
            }
        }

        function checkTorch() {
            try {
                const track = html5QrCode.getRunningTrackCapabilities();
                if (track && track.torch) document.getElementById('torch-button').style.display = 'block';
            } catch(e) {}
        }

        async function toggleTorch() {
            const btn = document.getElementById('torch-button');
            const isOff = btn.innerText.includes("ФОНАРИК");
            try {
                await html5QrCode.applyVideoConstraints({ advanced: [{ torch: isOff }] });
                btn.innerText = isOff ? "❌ ВЫКЛЮЧИТЬ" : "🔦 ФОНАРИК";
            } catch(e) { alert("Фонарик не поддерживается."); }
        }
    </script>
</body>
</html>
