<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Scanner - SOFRINOKBT</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-color: #00ffcc;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Контейнер сканера */
        #reader-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin-top: 20px;
            border-radius: 20px;
            overflow: hidden;
            background: black;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #reader {
            width: 100%;
            height: 100%;
        }

        /* Кастомная рамка 280x280 */
        #custom-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            border: 2px solid var(--glass-border);
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 0 500px rgba(0, 0, 0, 0.5);
        }

        /* Лазерная линия внутри рамки */
        #laser {
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-color);
            top: 0;
            left: 0;
            animation: scan 2s infinite linear;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        /* Панель управления */
        .controls {
            width: 90%;
            max-width: 350px;
            margin-top: 20px;
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            text-align: center;
        }

        .result-display {
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            word-break: break-all;
            min-height: 1.5em;
        }

        .glass-select, .glass-button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .glass-button {
            background: linear-gradient(135deg, rgba(0, 255, 204, 0.3), rgba(0, 153, 255, 0.3));
        }

        .glass-button:hover:not(:disabled) {
            background: rgba(0, 255, 204, 0.5);
        }

        .glass-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .glass-select option {
            background: #1a1a2e;
            color: white;
        }

        /* Подпись */
        .copyright {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="reader-wrapper">
        <div id="reader"></div>
        <div id="custom-overlay">
            <div id="laser"></div>
        </div>
    </div>

    <div class="controls">
        <div id="result" class="result-display">Ожидание сканирования...</div>
        
        <select id="route-select" class="glass-select">
            <option value="1">Маршрут №1</option>
            <option value="2">Маршрут №2</option>
            <option value="3">Маршрут №3</option>
            <option value="4">Маршрут №4</option>
            <option value="5">Маршрут №5</option>
            <option value="6">Маршрут №6</option>
            <option value="7">Маршрут №7</option>
            <option value="8">Маршрут №8</option>
            <option value="9">Маршрут №9</option>
        </select>

        <button id="send-btn" class="glass-button">ОТПРАВИТЬ В ТАБЛИЦУ</button>
    </div>

    <div class="copyright">
        DEVELOPED BY D. MARTINKEVICH FOR SOFRINOKBT
    </div>

<script>
    const GOOGLE_SCRIPT_URL = 'AKfycbysqigjJHvyz4wyJF0MbtXrRxFYOMhNTnFj6otCoMQ';
    let lastScannedId = null;

    function onScanSuccess(decodedText) {
        // Логика извлечения ID из формата $1:1:ID:ДАТА
        const parts = decodedText.split(':');
        
        if (parts.length >= 3) {
            const extractedId = parts[2]; // Берем третий элемент
            
            // Если код изменился или мы продолжаем держать его в фокусе
            if (lastScannedId !== extractedId) {
                lastScannedId = extractedId;
                document.getElementById('result').innerText = "ID: " + extractedId;
                document.getElementById('result').style.color = "#00ffcc";
                
                // Сигнал (звуковой или визуальный) можно добавить здесь
                console.log("Успешно считан ID:", extractedId);
            }
        } else {
            // Если формат не совпадает, выводим код как есть
            lastScannedId = decodedText;
            document.getElementById('result').innerText = decodedText;
        }
    }

    const html5QrCode = new Html5Qrcode("reader");
    const config = { 
        fps: 20, 
        qrbox: { width: 280, height: 280 },
        formatsToSupport: [ 
            Html5QrcodeSupportedFormats.EAN_13, 
            Html5QrcodeSupportedFormats.CODE_128, 
            Html5QrcodeSupportedFormats.EAN_8 
        ]
    };

    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);

    // Обработка кнопки отправки
    document.getElementById('send-btn').addEventListener('click', function() {
        const route = document.getElementById('route-select').value;
        const btn = this;

        if (!lastScannedId) {
            alert("Сначала отсканируйте код!");
            return;
        }

        btn.innerText = "ОТПРАВКА...";
        btn.disabled = true;

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                value: lastScannedId, 
                route: route 
            })
        })
        .then(() => {
            alert(`Успешно! Маршрут ${route}, ID ${lastScannedId} внесен.`);
            btn.innerText = "ОТПРАВИТЬ В ТАБЛИЦУ";
            btn.disabled = false;
        })
        .catch(error => {
            console.error('Ошибка:', error);
            alert("Ошибка сети при отправке");
            btn.disabled = false;
            btn.innerText = "ОТПРАВИТЬ В ТАБЛИЦУ";
        });
    });
</script>
</body>
</html>
