<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOFRINOKBT Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #0f0f1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        #reader-wrapper { position: relative; width: 320px; height: 320px; margin-top: 20px; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        #custom-overlay { position: absolute; top: 20px; left: 20px; width: 280px; height: 280px; border: 2px solid #00ffcc; z-index: 5; pointer-events: none; box-shadow: 0 0 0 500px rgba(0,0,0,0.5); }
        .panel { width: 90%; max-width: 360px; margin-top: 20px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .res { padding: 15px; background: #000; border-radius: 12px; text-align: center; font-size: 1.2rem; color: #00ffcc; margin-bottom: 15px; border: 1px solid #00ffcc; }
        select, .btn { width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px; border: none; font-size: 1rem; font-weight: bold; }
        .btn { background: #00ffcc; color: #000; cursor: pointer; }
        .history { width: 90%; max-width: 360px; margin-top: 20px; }
        .item { background: rgba(255,255,255,0.1); padding: 10px; margin-bottom: 5px; border-radius: 8px; display: flex; justify-content: space-between; }
        .copy { margin-top: 30px; font-size: 0.7rem; opacity: 0.5; font-weight: bold; }
    </style>
</head>
<body>

<div id="reader-wrapper">
    <div id="reader"></div>
    <div id="custom-overlay"></div>
</div>

<div class="panel">
    <div id="result" class="res">СКАНЕР ГОТОВ</div>
    <select id="route">
        <option value="1">Маршрут №1</option><option value="2">Маршрут №2</option>
        <option value="3">Маршрут №3</option><option value="4">Маршрут №4</option>
    </select>
    <button id="send-btn" class="btn" onclick="send()">ОТПРАВИТЬ ДАННЫЕ</button>
</div>

<div id="history-list" class="history"></div>
<div class="copy">DEVELOPED BY D. MARTINKEVICH FOR SOFRINOKBT</div>

<script>
    // ТВОЯ ССЫЛКА ИЗ РАЗВЕРТЫВАНИЯ
    const URL = 'https://script.google.com/macros/s/AKfycbysOLS6KdBf4soTVNhWEcbfVHEIYsxnsUGn89On5SRsAz3oi8oQLEUetddFjtuW8zbcIA/exec';

    let data = JSON.parse(localStorage.getItem('scans')) || {1:[],2:[],3:[],4:[]};
    const scanner = new Html5Qrcode("reader");

    scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 280 }, (text) => {
        const id = text.includes(':') ? text.split(':')[2].trim() : text.trim();
        const route = document.getElementById('route').value;
        const res = document.getElementById('result');

        if (data[route].some(i => i.id === id)) {
            res.innerText = "ДУБЛИКАТ: " + id;
            res.style.color = "#ff6b6b";
            return;
        }

        res.innerText = id;
        res.style.color = "#00ffcc";
        data[route].unshift({ id, time: new Date().toLocaleTimeString().slice(0,5) });
        localStorage.setItem('scans', JSON.stringify(data));
        update();
    });

    function update() {
        const r = document.getElementById('route').value;
        document.getElementById('history-list').innerHTML = data[r].map((i, idx) => `
            <div class="item"><span>${i.id}</span><span onclick="del(${idx})" style="color:#ff6b6b">✕</span></div>
        `).join('');
    }

    function del(idx) {
        data[document.getElementById('route').value].splice(idx, 1);
        localStorage.setItem('scans', JSON.stringify(data));
        update();
    }

    async function send() {
        const r = document.getElementById('route').value;
        const codes = data[r].map(i => i.id).join(', ');
        if (!codes) return alert("Пусто!");

        const b = document.getElementById('send-btn');
        b.innerText = "ОТПРАВЛЯЮ..."; b.disabled = true;

        try {
            await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ value: codes, route: r }) });
            alert("Готово! Проверь таблицу.");
        } catch(e) { alert("Ошибка!"); }
        b.innerText = "ОТПРАВИТЬ ДАННЫЕ"; b.disabled = false;
    }
    update();
</script>
</body>
</html>
