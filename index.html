<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scanner iOS Glass</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --glass-bg: rgba(28, 28, 30, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-green: #30d158;
            --accent-red: #ff453a;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--ios-bg);
            color: white;
            margin: 0;
            padding: 20px 16px;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Оболочка сканера */
        .scanner-wrap {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            background: #000;
        }

        #reader { width: 100% !important; border: none !important; position: relative; }
        #reader img { display: none !important; }

        /* ЛАЗЕР */
        .laser-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 250px; 
            height: 250px;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
            overflow: hidden; 
        }

        .laser-line {
            width: 100%;
            height: 3px;
            background: var(--accent-red);
            box-shadow: 0 0 15px 2px var(--accent-red);
            position: absolute;
            animation: scanAnim 2.5s infinite linear;
        }

        @keyframes scanAnim {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* Стеклянные элементы */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
        }

        select {
            width: 100%; background: transparent; color: white;
            border: none; font-size: 18px; font-weight: 600; outline: none;
        }

        .ios-btn {
            background: var(--accent-green);
            color: black; border: none; padding: 18px;
            border-radius: 16px; font-size: 17px; font-weight: 700;
            width: 100%; cursor: pointer; transition: 0.3s;
        }

        .ios-btn:disabled { background: #3a3a3c; color: #8e8e93; }

        #status {
            text-align: center; font-size: 20px; font-weight: 700;
            margin: 15px 0; min-height: 24px; color: var(--accent-green);
        }

        .history-card {
            background: rgba(255,255,255,0.05);
            padding: 12px; border-radius: 12px; margin-bottom: 8px;
            display: flex; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .flash-red { background-color: rgba(255, 69, 58, 0.2) !important; }
        .flash-green { background-color: rgba(48, 209, 88, 0.2) !important; }

        /* КОПИРАЙТ АВТОРА */
        .author-credits {
            margin-top: auto; /* Прижимает текст к низу экрана */
            padding-top: 30px;
            padding-bottom: 10px;
            text-align: center;
            font-size: 12px;
            color: #636366; /* Фирменный серый цвет Apple для сносок */
            font-weight: 500;
            letter-spacing: 0.5px;
            line-height: 1.5;
        }
    </style>
</head>
<body onclick="initAudio()">

    <div class="glass">
        <select id="route-select">
            <option value="Маршрут 1">Маршрут 1</option>
            <option value="Маршрут 2">Маршрут 2</option>
            <option value="Маршрут 3">Маршрут 3</option>
            <option value="Маршрут 4">Маршрут 4</option>
            <option value="Маршрут 5">Маршрут 5</option>
            <option value="Маршрут 6">Маршрут 6</option>
            <option value="Маршрут 7">Маршрут 7</option>
            <option value="Маршрут 8">Маршрут 8</option>
            <option value="Маршрут 9">Маршрут 9</option>
        </select>
    </div>

    <div class="scanner-wrap">
        <div id="reader"></div>
        <div class="laser-container">
            <div class="laser-line"></div>
        </div>
    </div>

    <div id="status">Готов</div>

    <button class="ios-btn" id="submit-btn" onclick="sendData()">
        Отправить данные (0)
    </button>

    <div style="margin-top: 20px; flex-grow: 1;">
        <h4 style="color: #8e8e93; margin-left: 10px;">ИСТОРИЯ</h4>
        <div id="history-box"></div>
    </div>

    <div class="author-credits">
        © 2026 Designed & Developed by D. Martinkevich<br>
        for Sofrino KBT
    </div>

<script>
    let historyData = {};
    for(let i=1; i<=9; i++) { historyData[`Маршрут ${i}`] = []; }
    let lastId = null;
    let isLocked = false;
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSound(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        
        if (type === 'success') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'error') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(250, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.setTargetAtTime(0, now + 0.1, 0.02);
            
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sawtooth';
            osc2.frequency.setValueAtTime(250, now + 0.15);
            gain2.gain.setValueAtTime(0.1, now + 0.15);
            gain2.gain.setTargetAtTime(0, now + 0.25, 0.02);
            
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc2.connect(gain2); gain2.connect(audioCtx.destination);
            
            osc.start(now); osc.stop(now + 0.15);
            osc2.start(now + 0.15); osc2.stop(now + 0.3);
        }
    }

    function flash(color) {
        document.body.classList.add('flash-' + color);
        setTimeout(() => document.body.classList.remove('flash-' + color), 300);
    }

    function updateUI() {
        const r = document.getElementById('route-select').value;
        const box = document.getElementById('history-box');
        box.innerHTML = '';
        historyData[r].forEach(item => {
            box.innerHTML += `<div class="history-card"><span>${item.id}</span><span style="color:#8e8e93">${item.time}</span></div>`;
        });
        const btn = document.getElementById('submit-btn');
        btn.textContent = `Отправить ${r} (${historyData[r].length})`;
        btn.disabled = historyData[r].length === 0 || isLocked;
    }

    function onScanSuccess(text) {
        if (isLocked) return;

        let id = text.trim();
        if (id.includes(':')) {
            const parts = id.split(':');
            if (parts.length >= 3) id = parts[2];
        }

        const r = document.getElementById('route-select').value;
        const status = document.getElementById('status');

        if (historyData[r].some(i => i.id === id)) {
            if (lastId !== id) {
                flash('red');
                playSound('error');
                status.style.color = 'var(--accent-red)';
                status.textContent = 'ДУБЛИКАТ';
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                lastId = id;
            }
            return;
        }

        lastId = id;
        flash('green');
        playSound('success');
        
        status.style.color = 'var(--accent-green)';
        status.textContent = id;
        if (navigator.vibrate) navigator.vibrate(40);

        historyData[r].unshift({ id: id, time: new Date().toLocaleTimeString().slice(0,5) });
        updateUI();
    }

    async function sendData() {
        const r = document.getElementById('route-select').value;
        const data = historyData[r];
        const status = document.getElementById('status');
        
        if (data.length === 0) return;

        isLocked = true;
        updateUI();
        status.textContent = 'Сохранение...';

        // ВАЖНО: ВСТАВЬТЕ СЮДА ВАШ URL ИЗ GOOGLE APPS SCRIPT
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyYdqLYYn0z6m8UgpS6mpWtw199xB0Eqbm6Oc2fI8haklkhd3ajBuI4Tu_OHvaopwb0/exec'; 

        try {
            const resp = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ route: r, data: data })
            });

            historyData[r] = [];
            lastId = null;
            status.textContent = 'Успешно отправлено!';
            status.style.color = 'var(--accent-green)';
            if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
        } catch (e) {
            alert('Ошибка сети! Проверьте интернет.');
        } finally {
            isLocked = false;
            updateUI();
            setTimeout(() => { if(!isLocked && status.textContent === 'Успешно отправлено!') status.textContent = 'Готов'; }, 2000);
        }
    }

    const scanner = new Html5QrcodeScanner("reader", { 
        fps: 20, 
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0
    });
    scanner.render(onScanSuccess);

    document.getElementById('route-select').addEventListener('change', updateUI);
</script>
</body>
</html>
