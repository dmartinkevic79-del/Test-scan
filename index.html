<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WB Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg-color: #000;
            --accent-green: #2ecc71;
            --text-main: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Сканнер */
        .scanner-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            background: #050505;
        }

        #reader { width: 100%; }

        /* Прозрачный медленный лазер */
        .scanner-laser {
            position: absolute;
            top: 25%;
            left: 15%;
            width: 70%;
            height: 1px;
            background: rgba(46, 204, 113, 0.15); 
            box-shadow: 0 0 10px 1px rgba(46, 204, 113, 0.2); 
            z-index: 10;
            display: none;
            pointer-events: none;
            animation: scanning 3.5s infinite ease-in-out; 
        }

        @keyframes scanning {
            0% { top: 25%; }
            50% { top: 75%; }
            100% { top: 25%; }
        }

        /* Глассморфизм для кнопок */
        .controls { display: flex; flex-direction: column; gap: 16px; margin-top: 25px; }
        
        button { 
            padding: 20px; 
            border-radius: 20px; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 15px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            text-transform: uppercase; 
            position: relative;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            letter-spacing: 0.5px;
        }

        button:active { transform: scale(0.96); opacity: 0.8; }

        /* Кнопка Старт — яркий градиент */
        .btn-start { 
            background: linear-gradient(135deg, rgba(155, 65, 204, 0.4), rgba(110, 39, 150, 0.2));
            border-color: rgba(155, 65, 204, 0.4);
            box-shadow: 0 8px 32px 0 rgba(155, 65, 204, 0.1);
        }

        /* Кнопка Копировать — зеленый глассморфизм */
        .btn-copy { 
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.2), rgba(39, 174, 96, 0.05));
            border-color: rgba(46, 204, 113, 0.3);
            box-shadow: 0 8px 32px 0 rgba(46, 204, 113, 0.1);
        }

        /* Кнопка Очистить — минималистичный гласс */
        .btn-clear { 
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.05);
            color: #666;
            margin-top: 5px;
        }

        .btn-torch { background: rgba(255, 255, 255, 0.08); display: none; }

        /* Список */
        #list-container { 
            margin-top: 25px; 
            background: rgba(255, 255, 255, 0.02); 
            border-radius: 28px; 
            padding: 24px; 
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
        }

        .status-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .count-value { color: var(--accent-green); font-size: 32px; font-weight: 900; text-shadow: 0 0 15px rgba(46, 204, 113, 0.3); }
        
        ul { list-style: none; padding: 0; margin-top: 15px; }
        li { padding: 16px 0; border-top: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .code-text { font-size: 17px; color: #ddd; letter-spacing: 0.5px; }
        .time-text { font-size: 12px; color: #444; }

        /* Вспышка и Уведомления */
        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(46, 204, 113, 0.25);
            z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.1s;
        }
        .flash-active { opacity: 1 !important; }

        #status-overlay {
            position: fixed; top: 25%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(241, 196, 15, 0.9);
            backdrop-filter: blur(10px);
            color: #000; padding: 16px 32px; border-radius: 50px;
            font-weight: 900; font-size: 16px; z-index: 10000; display: none;
        }

        .footer { 
            text-align: center; font-size: 10px; color: #555; 
            margin: 40px 0 20px 0; text-transform: uppercase; 
            letter-spacing: 2px; font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="flash-overlay"></div>
    <div id="status-overlay">⚠️ УЖЕ В СПИСКЕ</div>

    <div class="scanner-wrapper">
        <div id="reader"></div>
        <div id="laser" class="scanner-laser"></div>
    </div>

    <div class="controls">
        <button id="start-btn" class="btn-start" onclick="initScanner()">🚀 ЗАПУСТИТЬ СКАНЕР</button>
        <button id="torch-button" class="btn-torch" onclick="toggleTorch()">🔦 ФОНАРИК</button>
        <button class="btn-copy" onclick="copyToClipboard()">📋 КОПИРОВАТЬ СПИСОК</button>
        <button class="btn-clear" onclick="clearList()">🗑️ ОЧИСТИТЬ СПИСОК</button>
    </div>

    <div id="list-container">
        <div class="status-bar">
            <span style="color: #444; font-weight: 800; font-size: 13px;">СЧИТАНО ОБЪЕКТОВ</span>
            <span id="count" class="count-value">0</span>
        </div>
        <ul id="scanned-codes"></ul>
    </div>

    <div class="footer">DEVELOPED BY D. MARTINKEVICH FOR SOFRINOKBT</div>

    <script>
        let codes = JSON.parse(localStorage.getItem('wb_codes_v10') || '[]');
        let html5QrCode = null;
        let lastScanTime = 0;
        const SCAN_DELAY = 2200; 

        window.onload = () => renderList();

        function showDuplicateWarning() {
            const el = document.getElementById('status-overlay');
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 1500);
        }

        function triggerVisualFeedback() {
            const flash = document.getElementById('flash-overlay');
            flash.classList.add('flash-active');
            setTimeout(() => { flash.classList.remove('flash-active'); }, 150);
        }

        async function initScanner() {
            if (html5QrCode) { try { await html5QrCode.stop(); } catch(e) {} }
            html5QrCode = new Html5Qrcode("reader");
            
            const config = {
                fps: 25,
                qrbox: 250, // Строгий квадрат
                aspectRatio: 1.0,
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    (text) => {
                        const now = Date.now();
                        if (now - lastScanTime < SCAN_DELAY) return;

                        let match = text.match(/\d{10,}/);
                        let processed = match ? match[0] : text;

                        if (codes.some(c => c.text === processed)) {
                            showDuplicateWarning();
                            lastScanTime = now;
                            return;
                        }

                        codes.push({ 
                            text: processed, 
                            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                        });
                        localStorage.setItem('wb_codes_v10', JSON.stringify(codes));
                        
                        triggerVisualFeedback();
                        renderList();
                        new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3').play().catch(()=>{});
                        lastScanTime = now;
                    }
                );
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('laser').style.display = 'block';
                setTimeout(checkTorch, 1000);
            } catch (err) {
                alert("Камера недоступна. Убедитесь, что используется HTTPS.");
            }
        }

        function renderList() {
            const list = document.getElementById('scanned-codes');
            list.innerHTML = '';
            [...codes].reverse().forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `<span class="code-text">${item.text}</span><span class="time-text">${item.time}</span>`;
                list.appendChild(li);
            });
            document.getElementById('count').innerText = codes.length;
        }

        function copyToClipboard() {
            if (!codes.length) return;
            const body = codes.map(c => c.text).join('\n');
            navigator.clipboard.writeText(body).then(() => { alert("Скопировано!"); });
        }

        function clearList() {
            if (confirm("Удалить все записи?")) {
                codes = [];
                localStorage.removeItem('wb_codes_v10');
                renderList();
            }
        }

        function checkTorch() {
            try {
                const track = html5QrCode.getRunningTrackCapabilities();
                if (track && track.torch) document.getElementById('torch-button').style.display = 'block';
            } catch(e) {}
        }

        async function toggleTorch() {
            const btn = document.getElementById('torch-button');
            const isOff = btn.innerText.includes("ФОНАРИК");
            try {
                await html5QrCode.applyVideoConstraints({ advanced: [{ torch: isOff }] });
                btn.innerText = isOff ? "❌ ВЫКЛЮЧИТЬ" : "🔦 ФОНАРИК";
            } catch(e) {}
        }
    </script>
</body>
</html>
