<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scanner iOS Glass</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --glass-bg: rgba(28, 28, 30, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-green: #30d158;
            --accent-red: #ff453a;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--ios-bg);
            color: white;
            margin: 0;
            padding: 20px 16px;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Оболочка сканера */
        .scanner-wrap {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 28px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 1 / 1;
            border: 1px solid var(--glass-border);
        }

        #reader { width: 100% !important; border: none !important; }
        #reader video { object-fit: cover !important; }

        /* УБИРАЕМ СТАНДАРТНЫЕ БЕЛЫЕ УГЛЫ БИБЛИОТЕКИ */
        #reader__scan_region svg { display: none !important; }
        #reader__scan_region { border: none !important; }

        /* НАША ИДЕАЛЬНАЯ РАМКА */
        .custom-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 260px; /* Чуть шире qrbox для красоты */
            height: 260px;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
            background: 
                linear-gradient(to right, #fff 4px, transparent 4px) 0 0,
                linear-gradient(to bottom, #fff 4px, transparent 4px) 0 0,
                linear-gradient(to left, #fff 4px, transparent 4px) 100% 0,
                linear-gradient(to bottom, #fff 4px, transparent 4px) 100% 0,
                linear-gradient(to right, #fff 4px, transparent 4px) 0 100%,
                linear-gradient(to top, #fff 4px, transparent 4px) 0 100%,
                linear-gradient(to left, #fff 4px, transparent 4px) 100% 100%,
                linear-gradient(to top, #fff 4px, transparent 4px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 40px 40px;
        }

        .laser-line {
            width: calc(100% - 10px);
            left: 5px;
            height: 3px;
            background: var(--accent-red);
            box-shadow: 0 0 15px 2px var(--accent-red);
            position: absolute;
            animation: scanAnim 2.5s infinite linear;
        }

        @keyframes scanAnim {
            0% { top: 5px; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: calc(100% - 8px); opacity: 0; }
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
        }

        select {
            width: 100%; background: transparent; color: white;
            border: none; font-size: 18px; font-weight: 600; outline: none;
        }

        .ios-btn {
            background: var(--accent-green);
            color: black; border: none; padding: 18px;
            border-radius: 16px; font-size: 17px; font-weight: 700;
            width: 100%; cursor: pointer; transition: 0.3s;
        }

        .ios-btn:disabled { background: #3a3a3c; color: #8e8e93; }

        #status {
            text-align: center; font-size: 20px; font-weight: 700;
            margin: 15px 0; min-height: 24px; color: var(--accent-green);
        }

        .history-card {
            background: rgba(255,255,255,0.05);
            padding: 12px; border-radius: 12px; margin-bottom: 8px;
            display: flex; justify-content: space-between;
        }

        .author-credits {
            margin-top: auto; 
            padding: 20px 0;
            text-align: center;
            font-size: 12px;
            color: #636366;
        }
        
        .flash-red { background-color: rgba(255, 69, 58, 0.2) !important; }
        .flash-green { background-color: rgba(48, 209, 88, 0.2) !important; }
    </style>
</head>
<body onclick="initAudio()">

    <div class="glass">
        <select id="route-select">
            <option value="Маршрут 1">Маршрут 1</option>
            <option value="Маршрут 2">Маршрут 2</option>
            <option value="Маршрут 3">Маршрут 3</option>
            <option value="Маршрут 4">Маршрут 4</option>
            <option value="Маршрут 5">Маршрут 5</option>
            <option value="Маршрут 6">Маршрут 6</option>
            <option value="Маршрут 7">Маршрут 7</option>
            <option value="Маршрут 8">Маршрут 8</option>
            <option value="Маршрут 9">Маршрут 9</option>
        </select>
    </div>

    <div class="scanner-wrap">
        <div id="reader"></div>
        <div class="custom-overlay">
            <div class="laser-line"></div>
        </div>
    </div>

    <div id="status">Готов</div>

    <button class="ios-btn" id="submit-btn" onclick="sendData()">
        Отправить данные (0)
    </button>

    <div style="margin-top: 20px; flex-grow: 1;">
        <div id="history-box"></div>
    </div>

    <div class="author-credits">
        © 2026 Designed & Developed by D. Martinkevich<br>
        for Sofrino KBT
    </div>

<script>
    let historyData = {};
    for(let i=1; i<=9; i++) { historyData[`Маршрут ${i}`] = []; }
    let lastId = null;
    let isLocked = false;
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        if (type === 'success') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(1200, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.1);
        } else {
            const osc = audioCtx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(250, now);
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.setTargetAtTime(0, now + 0.2, 0.05);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.3);
        }
    }

    function onScanSuccess(text) {
        if (isLocked) return;
        let id = text.trim();
        if (id.includes(':')) id = id.split(':')[2] || id;

        const r = document.getElementById('route-select').value;
        const status = document.getElementById('status');

        if (historyData[r].some(i => i.id === id)) {
            if (lastId !== id) {
                playSound('error');
                document.body.classList.add('flash-red');
                setTimeout(() => document.body.classList.remove('flash-red'), 300);
                status.textContent = 'ДУБЛИКАТ';
                status.style.color = 'var(--accent-red)';
                lastId = id;
            }
            return;
        }

        lastId = id;
        playSound('success');
        document.body.classList.add('flash-green');
        setTimeout(() => document.body.classList.remove('flash-green'), 300);
        status.textContent = id;
        status.style.color = 'var(--accent-green)';

        historyData[r].unshift({ id: id, time: new Date().toLocaleTimeString().slice(0,5) });
        updateUI();
    }

    function updateUI() {
        const r = document.getElementById('route-select').value;
        const box = document.getElementById('history-box');
        box.innerHTML = '';
        historyData[r].forEach(item => {
            box.innerHTML += `<div class="history-card"><span>${item.id}</span><span style="color:#8e8e93">${item.time}</span></div>`;
        });
        const btn = document.getElementById('submit-btn');
        btn.textContent = `Отправить ${r} (${historyData[r].length})`;
        btn.disabled = historyData[r].length === 0 || isLocked;
    }

    async function sendData() {
        const r = document.getElementById('route-select').value;
        const WEB_APP_URL = 'ВАШ_URL'; // ВСТАВЬ СЮДА СВОЙ URL
        isLocked = true;
        updateUI();
        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ route: r, data: historyData[r] })
            });
            historyData[r] = [];
            document.getElementById('status').textContent = 'Отправлено!';
        } catch (e) { alert('Ошибка!'); }
        isLocked = false;
        updateUI();
    }

    // ВОЗВРАЩАЕМ QRBOX ДЛЯ СТАБИЛЬНОСТИ
    const scanner = new Html5QrcodeScanner("reader", { 
        fps: 20, 
        qrbox: { width: 250, height: 250 },
        rememberLastUsedCamera: true,
        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
    });
    scanner.render(onScanSuccess);

    document.getElementById('route-select').addEventListener('change', updateUI);
</script>
</body>
</html>
