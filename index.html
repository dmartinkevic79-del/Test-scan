<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; margin: 0; padding: 20px; }
        #reader { width: 100%; max-width: 500px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .controls { margin: 20px 0; width: 100%; max-width: 500px; display: flex; gap: 10px; }
        select { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        #result { margin-top: 20px; padding: 15px; border-radius: 5px; background: white; min-width: 250px; text-align: center; font-weight: bold; }
        .duplicate-text { color: #dc3545; animation: shake 0.5s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
    </style>
</head>
<body>

<div id="reader"></div>

<div class="controls">
    <select id="route-select">
        <option value="Route_1">Маршрут 1</option>
        <option value="Route_2">Маршрут 2</option>
    </select>
</div>

<div id="result">Ожидание сканирования...</div>

<script>
// --- КОНФИГУРАЦИЯ ---
const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbwiDuT4Vk6l2tIv2kBMbeqbgcEyC_f-jicNTxLgdTbKed-qhha3sWdVHwaARj3uTljQ/exec"; 
let historyData = { "Route_1": [], "Route_2": [] };
let lastScannedId = null;

// --- ЗВУКОВОЙ ДВИЖОК ---
function playBeep(type = 'success') {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);

        if (type === 'success') {
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        } else {
            osc.frequency.setValueAtTime(330, ctx.currentTime);
            osc.start(); osc.stop(ctx.currentTime + 0.2);
            setTimeout(() => {
                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.connect(gain2); gain2.connect(ctx.destination);
                gain2.gain.setValueAtTime(0.1, ctx.currentTime);
                osc2.frequency.setValueAtTime(330, ctx.currentTime);
                osc2.start(); osc2.stop(ctx.currentTime + 0.2);
            }, 250);
        }
    } catch(e) { console.error("Audio error", e); }
}

// --- ОТПРАВКА ДАННЫХ ---
async function sendToGoogle(id, route, time) {
    try {
        await fetch(GOOGLE_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ id, route, time })
        });
    } catch (e) { console.error("Ошибка сети:", e); }
}

// --- ЛОГИКА СКАНЕРА ---
function onScanSuccess(decodedText) {
    const parts = decodedText.split(':');
    const id = (parts.length >= 3 ? parts[2] : decodedText).trim();
    const r = document.getElementById('route-select').value;
    const resultDisplay = document.getElementById('result');

    // Проверка на дубликат в текущей сессии
    if (historyData[r].some(item => item.id === id)) {
        if (lastScannedId !== id) {
            playBeep('error');
            resultDisplay.innerHTML = `<span class="duplicate-text">ДУБЛИКАТ: ${id}</span>`;
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            lastScannedId = id;
        }
        return;
    }

    // Новый код
    lastScannedId = id;
    const timeNow = new Date().toLocaleTimeString().slice(0, 5);
    
    playBeep('success');
    if (navigator.vibrate) navigator.vibrate(100);
    
    resultDisplay.innerText = `ОТПРАВЛЕНО: ${id}`;
    resultDisplay.classList.remove('duplicate-text');

    // Сохраняем локально и отправляем в облако
    historyData[r].unshift({ id, time: timeNow });
    sendToGoogle(id, r, timeNow);
}

// Инициализация камеры
const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
html5QrcodeScanner.render(onScanSuccess);

</script>
</body>
</html>
