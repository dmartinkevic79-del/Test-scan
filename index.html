<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Pro Glass</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --glass-bg: rgba(28, 28, 30, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-green: #30d158;
            --accent-red: #ff453a;
            --text-main: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--ios-bg);
            background-image: radial-gradient(circle at top right, #1c1c1e, #000000);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px;
            min-height: 100vh;
            transition: background-color 0.3s;
        }

        /* Эффект вспышки */
        .flash-green { background-color: rgba(48, 209, 88, 0.2) !important; }
        .flash-red { background-color: rgba(255, 69, 58, 0.2) !important; }

        h3, h4 { font-weight: 600; letter-spacing: -0.5px; margin-bottom: 10px; }

        /* Контейнер камеры */
        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
        }

        /* Стеклянные элементы управления */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
        }

        select {
            width: 100%;
            background: transparent;
            color: white;
            border: none;
            font-size: 17px;
            appearance: none;
            outline: none;
            text-align: center;
        }

        /* Кнопка в стиле iOS */
        .ios-btn {
            display: block;
            width: 100%;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            text-align: center;
        }

        .btn-primary {
            background: var(--accent-green);
            color: #000;
        }

        .btn-primary:active {
            transform: scale(0.97);
            filter: brightness(0.8);
        }

        .btn-primary:disabled {
            background: #3a3a3c;
            color: #8e8e93;
        }

        #result {
            text-align: center;
            font-size: 19px;
            font-weight: 500;
            margin: 15px 0;
            height: 24px;
            color: var(--accent-green);
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 15px;
        }

        .history-item:last-child { border: none; }
        .time-label { color: #8e8e93; font-variant-numeric: tabular-nums; }
        .dup-text { color: var(--accent-red); }

        /* Кастомная стрелочка для селекта */
        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: "▼";
            font-size: 10px;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="select-wrapper">
            <select id="route-select">
                <option value="Маршрут 1">Маршрут 8</option>
                <option value="Маршрут 2">Маршрут 944</option>
                <option value="Маршрут 3">Маршрут 943</option>
                <option value="Маршрут 4">Маршрут 18</option>
                <option value="Маршрут 5">Маршрут 919</option>
                <option value="Маршрут 6">Маршрут 6</option>
                <option value="Маршрут 7">Маршрут 7</option>
                <option value="Маршрут 8">Маршрут 8</option>
                <option value="Маршрут 9">Маршрут 9</option>
            </select>
        </div>
    </div>

    <div id="reader"></div>
    
    <div id="result">Готов к сканированию</div>

    <button class="ios-btn btn-primary" id="submit-btn" onclick="sendDataToGoogleSheets()">
        Отправить данные
    </button>

    <div style="margin-top: 25px;">
        <h4 id="history-title">История</h4>
        <div class="glass-card">
            <ul id="history-list" class="history-list">
                </ul>
        </div>
    </div>

<script>
    let historyData = {};
    for(let i=1; i<=9; i++) { historyData[`Маршрут ${i}`] = []; }
    let lastScannedId = null;

    function playSuccessBeep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            gain.gain.value = 0.05;
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        } catch(e) {}
    }

    function triggerFlash(colorClass) {
        document.body.classList.add(colorClass);
        setTimeout(() => document.body.classList.remove(colorClass), 300);
    }

    function updateUI() {
        const r = document.getElementById('route-select').value;
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        
        historyData[r].forEach(item => {
            let li = document.createElement('li');
            li.className = 'history-item';
            li.innerHTML = `<span>${item.id}</span> <span class="time-label">${item.time}</span>`;
            list.appendChild(li);
        });
        
        const btn = document.getElementById('submit-btn');
        btn.textContent = `Отправить ${r} (${historyData[r].length})`;
    }

    document.getElementById('route-select').addEventListener('change', updateUI);

    function onScanSuccess(decodedText) {
        const id = decodedText.trim();
        const r = document.getElementById('route-select').value;
        const resultDisplay = document.getElementById('result');

        const exists = historyData[r].some(item => item.id === id);

        if (exists) {
            if (lastScannedId !== id) { 
                triggerFlash('flash-red');
                resultDisplay.innerHTML = `<span class="dup-text">ДУБЛИКАТ</span>`;
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                lastScannedId = id; 
            }
            return;
        }

        lastScannedId = id;
        triggerFlash('flash-green');
        playSuccessBeep();
        
        historyData[r].unshift({ id: id, time: new Date().toLocaleTimeString().slice(0, 5) });
        updateUI();
        
        resultDisplay.innerHTML = id;
        if (navigator.vibrate) navigator.vibrate(40);
    }

    async function sendDataToGoogleSheets() {
        const r = document.getElementById('route-select').value;
        const currentRouteData = historyData[r];

        if (currentRouteData.length === 0) return;

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'Сохранение...';

        // ВАЖНО: Вставьте ваш URL
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwiDuT4Vk6l2tIv2kBMbeqbgcEyC_f-jicNTxLgdTbKed-qhha3sWdVHwaARj3uTljQ/exec'; 

        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify({ route: r, data: currentRouteData })
            });

            const result = await response.json();
            if (result.status === 'success') {
                historyData[r] = []; 
                updateUI();
                lastScannedId = null;
                document.getElementById('result').textContent = 'Успешно отправлено';
            }
        } catch (error) {
            alert('Ошибка сети');
        } finally {
            btn.disabled = false;
            updateUI();
        }
    }

    // Инициализация сканера с более современным видом
    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 20, 
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0
    });
    html5QrcodeScanner.render(onScanSuccess);
    updateUI();
</script>
</body>
</html>
