<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0f16">
    <title>Sklad Scanner Elite v8</title>
    
    <link rel="manifest" id="manifest-placeholder">
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root {
            --bg: #05080a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --success: #00ff9d;
            --danger: #ff4d4d;
            --accent: #00d4ff;
            --text: #e0e6ed;
            --qr-size: 280px;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; padding: 0;
            background: #05080a;
            color: var(--text);
            min-height: 100vh;
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        #flashOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; display: none; pointer-events: none;
        }

        .container { 
            max-width: 500px; margin: 0 auto; padding: 12px; 
            width: 100%; box-sizing: border-box; flex: 1;
            display: flex; flex-direction: column;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; padding: 18px;
            border: 1px solid var(--glass-border);
            margin-bottom: 15px;
        }

        h2 { margin: 0 0 15px 0; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; text-align: center;}

        textarea {
            width: 100%; height: 110px; background: rgba(0, 0, 0, 0.6); color: var(--success);
            border: 1px solid var(--glass-border); border-radius: 16px; padding: 15px;
            font-family: 'Consolas', monospace; font-size: 16px; box-sizing: border-box;
            outline: none; transition: 0.3s; resize: none;
        }

        button {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            font-size: 14px; font-weight: 700; color: white; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.2s ease; margin-top: 10px;
        }
        button:active { transform: scale(0.98); }

        .btn-start { background: linear-gradient(135deg, #006357, #4e6b1e); }
        .btn-clear { background: rgba(255, 77, 77, 0.05); border: 1px solid rgba(255, 77, 77, 0.3); color: #ff8080; }
        .btn-copy { background: linear-gradient(135deg, #007799, #002b55); flex: 2; margin: 0; }
        .btn-stop { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); flex: 1; margin: 0; }
        
        .btn-torch { 
            background: rgba(245, 158, 11, 0.1); border: 1px solid #f59e0b; 
            color: #f59e0b; margin-bottom: 10px; display: none; margin-top: 0;
        }

        #reader-container { 
            position: relative; border-radius: 20px; overflow: hidden; 
            background: #000; aspect-ratio: 1/1; 
        }
        
        /* Оптимизированный лазер */
        .laser {
            position: absolute; 
            left: calc(50% - (var(--qr-size) / 2));
            width: var(--qr-size); 
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            z-index: 5; pointer-events: none;
            display: none;
            will-change: transform;
            /* Вычисляем начальную точку: 50% высоты контейнера минус половина рамки */
            top: calc(50% - (var(--qr-size) / 2));
            animation: scan-optimized 3.5s linear infinite;
        }

        @keyframes scan-optimized {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(var(--qr-size)); opacity: 0; }
        }

        .stats {
            display: flex; justify-content: space-between; background: var(--glass-bg);
            padding: 15px 20px; border-radius: 20px; margin-bottom: 12px;
            border: 1px solid var(--glass-border);
        }
        .val { font-size: 28px; font-weight: 800; color: #fff; line-height: 1; }
        .label { font-size: 10px; opacity: 0.4; font-weight: 900; text-transform: uppercase; }

        .found-list {
            list-style: none; padding: 0; margin: 0; max-height: 150px;
            overflow-y: auto; border-radius: 12px; background: rgba(0,0,0,0.2);
        }
        .found-list li {
            padding: 12px 15px; border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; font-size: 14px;
        }
        .found-list li strong { color: var(--success); font-family: monospace; }

        .attribution {
            text-align: center; font-size: 10px; color: #9ca3af;
            padding: 20px 0; text-transform: uppercase; letter-spacing: 2px;
            font-weight: 600;
        }
        
        #screenScanner { display: none; flex-direction: column; }
    </style>
</head>
<body>

<div id="flashOverlay"></div>

<div class="container">
    <div id="screenSetup">
        <div class="card">
            <h2>Elite Scanner v8</h2>
            <textarea id="codesInput" placeholder="Список штрихкодов..."></textarea>
            <button class="btn-start" id="startBtn" onclick="startApp()">Запустить сканер</button>
            <button class="btn-clear" onclick="clearMemory()">Очистить всё</button>
        </div>
    </div>

    <div id="screenScanner">
        <button id="torchBtn" class="btn-torch" onclick="toggleTorch()">🔦 Фонарик</button>
        
        <div class="card" style="padding: 0; overflow: hidden;">
            <div id="reader-container">
                <div id="reader"></div>
                <div id="laser" class="laser"></div>
            </div>
        </div>

        <div class="stats">
            <div><span class="label">Готово</span><span class="val" id="countFound">0</span></div>
            <div style="text-align:right"><span class="label">Осталось</span><span class="val" id="countLeft" style="color: var(--accent)">0</span></div>
        </div>

        <div class="card">
            <ul class="found-list" id="foundItemsList"></ul>
            <div style="display: flex; gap: 12px; margin-top: 15px;">
                <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">Отчет</button>
                <button class="btn-stop" onclick="pauseApp()">Назад</button>
            </div>
        </div>
    </div>
</div>

<div class="attribution">
    developed by D. Martinkevich for SofrinoKBT
</div>

<script>
    let targetCodes = new Set();
    let foundCodes = new Set();
    let foundLog = [];
    let html5QrCode;
    let wakeLock = null;
    let isTorchOn = false;
    let isAppPaused = false;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    window.onload = () => {
        const savedInput = localStorage.getItem('codesInput');
        if (savedInput) document.getElementById('codesInput').value = savedInput;
        foundCodes = new Set(JSON.parse(localStorage.getItem('foundCodes') || '[]'));
        foundLog = JSON.parse(localStorage.getItem('foundLog') || '[]');
        
        // Visibility API: Пауза при сворачивании браузера
        document.addEventListener("visibilitychange", () => {
            if (document.hidden && html5QrCode && !isAppPaused) {
                softPause();
            } else if (!document.hidden && isAppPaused) {
                softResume();
            }
        });
    };

    async function startApp() {
        const input = document.getElementById('codesInput').value;
        const lines = input.split('\n').map(s => s.trim()).filter(s => s !== "");
        if (!lines.length) return alert("Введите штрихкоды!");

        targetCodes = new Set(lines);
        document.getElementById('screenSetup').style.display = 'none';
        document.getElementById('screenScanner').style.display = 'flex';
        document.getElementById('laser').style.display = 'block';
        updateUI();

        if ('wakeLock' in navigator) try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}

        initScanner();
    }

    async function initScanner() {
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

        const config = {
            fps: 15, // Оптимизация батареи
            qrbox: { width: 280, height: 280 },
            formatsToSupport: [ 
                Html5QrcodeSupportedFormats.EAN_13, 
                Html5QrcodeSupportedFormats.EAN_8, 
                Html5QrcodeSupportedFormats.CODE_128 
            ],
            videoConstraints: {
                facingMode: "environment",
                width: { ideal: 1280 }, // HD вместо Full HD для стабильности
                height: { ideal: 720 },
                focusMode: "continuous"
            }
        };

        try {
            await html5QrCode.start({ facingMode: "environment" }, config, (text) => {
                const id = text.trim(); 
                if (targetCodes.has(id)) {
                    if (!foundCodes.has(id)) {
                        triggerFeedback('success');
                        foundCodes.add(id);
                        foundLog.unshift({ id, time: new Date().toLocaleTimeString('ru-RU') });
                        saveState();
                        updateUI();
                    }
                } else {
                    triggerFeedback('fail');
                }
            });
            
            const cap = html5QrCode.getRunningTrackCapabilities();
            document.getElementById('torchBtn').style.display = cap.torch ? 'block' : 'none';
            isAppPaused = false;
        } catch (err) {
            console.error("Scanner error", err);
        }
    }

    // Мягкая пауза и возобновление для экономии ресурсов
    async function softPause() {
        isAppPaused = true;
        if (html5QrCode) await html5QrCode.pause();
        document.getElementById('laser').style.display = 'none';
    }

    async function softResume() {
        if (html5QrCode) await html5QrCode.resume();
        document.getElementById('laser').style.display = 'block';
        isAppPaused = false;
    }

    function triggerFeedback(type) {
        const overlay = document.getElementById('flashOverlay');
        overlay.style.backgroundColor = type === 'success' ? 'rgba(0, 255, 157, 0.3)' : 'rgba(255, 77, 77, 0.3)';
        if (type === 'success' && audioCtx.state !== 'closed') {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }
        overlay.style.display = 'block';
        setTimeout(() => overlay.style.display = 'none', 100);
    }

    function updateUI() {
        document.getElementById('countFound').innerText = foundCodes.size;
        document.getElementById('countLeft').innerText = Math.max(0, targetCodes.size - foundCodes.size);
        document.getElementById('foundItemsList').innerHTML = foundLog.slice(0, 50).map(i => `<li><strong>${i.id}</strong><span style="opacity:0.4">${i.time}</span></li>`).join('');
    }

    function saveState() {
        localStorage.setItem('codesInput', document.getElementById('codesInput').value);
        localStorage.setItem('foundCodes', JSON.stringify([...foundCodes]));
        localStorage.setItem('foundLog', JSON.stringify(foundLog));
    }

    async function toggleTorch() {
        isTorchOn = !isTorchOn;
        try {
            await html5QrCode.applyVideoConstraints({ advanced: [{ torch: isTorchOn }] });
            document.getElementById('torchBtn').innerText = isTorchOn ? "🔦 Фонарик: ВКЛ" : "🔦 Фонарик: ВЫКЛ";
        } catch (e) {}
    }

    function clearMemory() {
        if (confirm("Сбросить данные?")) { localStorage.clear(); location.reload(); }
    }

    function copyToClipboard() {
        const txt = foundLog.map(i => `${i.id}\t${i.time}`).join('\n');
        navigator.clipboard.writeText(txt).then(() => alert("Скопировано"));
    }

    function pauseApp() {
        if (wakeLock) wakeLock.release();
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('screenScanner').style.display = 'none';
                document.getElementById('screenSetup').style.display = 'block';
            });
        }
    }
</script>
</body>
</html>
