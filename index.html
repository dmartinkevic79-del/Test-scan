<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WB Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg-color: #000;
            --success-flash: #0e3a15;
            --warning-color: #7a5e00;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: #fff; 
            margin: 0; 
            padding: 20px; 
            transition: background 0.15s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Контейнер сканера с рамкой */
        #reader { 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
            border-radius: 24px; 
            overflow: hidden; 
            border: 2px solid #1a1a1a; 
            background: #050505; 
            position: relative;
        }

        /* Центрированное уведомление о дубликате */
        #status-overlay {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 187, 0, 0.9);
            color: #000;
            padding: 20px 40px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 20px;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            white-space: nowrap;
            pointer-events: none;
        }
        
        .controls { display: flex; flex-direction: column; gap: 14px; margin-top: 20px; }
        
        /* Кнопки: еще более темные и приглушенные */
        button { 
            padding: 18px; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; 
            font-size: 15px; transition: all 0.1s ease; 
            text-transform: uppercase; position: relative; top: 0;
            color: #a0a0a0;
        }
        button:active { top: 3px; box-shadow: none !important; }

        .btn-start { 
            background: linear-gradient(145deg, #2d1338, #1a0b21); 
            box-shadow: 0 5px 0 #120717;
        }
        .btn-copy { 
            background: linear-gradient(145deg, #0d2e14, #081a0b); 
            box-shadow: 0 5px 0 #040d05;
        }
        .btn-clear { 
            background: linear-gradient(145deg, #3d120f, #240a08); 
            box-shadow: 0 5px 0 #170605;
        }
        .btn-torch { 
            background: linear-gradient(145deg, #423800, #262000); 
            display: none; box-shadow: 0 5px 0 #141100;
        }
        
        #list-container { margin-top: 20px; background: #0c0c0e; border-radius: 24px; padding: 20px; margin-bottom: 50px; border: 1px solid #1a1a1a; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; }
        .count-value { color: #1e7d2c; font-size: 28px; font-weight: 800; }
        
        ul { list-style: none; padding: 0; margin-top: 15px; }
        li { padding: 12px 0; border-top: 1px solid #151517; display: flex; flex-direction: column; }
        .code-text { font-size: 17px; font-weight: 600; color: #888; }
        .time-text { font-size: 11px; color: #3d3d3d; margin-top: 4px; }

        .footer {
            text-align: center;
            font-size: 9px;
            color: #222;
            margin-top: 10px;
            padding-bottom: 30px;
            text-transform: uppercase;
        }
        
        .flash-active { background-color: var(--success-flash) !important; }
        .warning-flash { background-color: var(--warning-color) !important; }
    </style>
</head>
<body>
    <div id="reader"></div>
    <div id="status-overlay">⚠️ УЖЕ В СПИСКЕ</div>

    <div class="controls">
        <button id="start-btn" class="btn-start" onclick="initScanner()">🚀 ЗАПУСТИТЬ СКАНЕР</button>
        <button id="torch-button" class="btn-torch" onclick="toggleTorch()">🔦 ФОНАРИК</button>
        <button class="btn-copy" onclick="copyToClipboard()">📋 КОПИРОВАТЬ СПИСОК</button>
        <button class="btn-clear" onclick="clearList()">🗑️ ОЧИСТИТЬ СПИСОК</button>
    </div>

    <div id="list-container">
        <div class="status-bar">
            <span style="color: #333; font-weight: 600; font-size: 12px;">СЧИТАНО КОДОВ</span>
            <span id="count" class="count-value">0</span>
        </div>
        <ul id="scanned-codes"></ul>
    </div>

    <div class="footer">Developed by D. Martinkevich for SofrinoKBT</div>

    <script>
        let codes = JSON.parse(localStorage.getItem('wb_codes_v6') || '[]');
        let html5QrCode = null;
        let lastScanTime = 0;
        const SCAN_DELAY = 2200; 

        window.onload = () => renderList();

        function showDuplicateWarning() {
            const el = document.getElementById('status-overlay');
            el.style.display = 'block';
            document.body.classList.add('warning-flash');
            
            setTimeout(() => { 
                el.style.display = 'none'; 
                document.body.classList.remove('warning-flash');
            }, 1200);
        }

        async function initScanner() {
            if (html5QrCode) { try { await html5QrCode.stop(); } catch(e) {} }
            html5QrCode = new Html5Qrcode("reader");
            
            const config = {
                fps: 25,
                qrbox: { width: 280, height: 140 }, // Возвращаем рамку-ориентир
                aspectRatio: 1.0,
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    (text) => {
                        const now = Date.now();
                        if (now - lastScanTime < SCAN_DELAY) return;

                        let match = text.match(/\d{10,}/);
                        let processed = match ? match[0] : text;

                        if (codes.some(c => c.text === processed)) {
                            showDuplicateWarning(); // Крупное уведомление
                            lastScanTime = now;
                            return;
                        }

                        const dateObj = new Date();
                        codes.push({ 
                            text: processed, 
                            time: dateObj.toLocaleTimeString(),
                            date: dateObj.toLocaleDateString()
                        });
                        localStorage.setItem('wb_codes_v6', JSON.stringify(codes));
                        
                        triggerVisualFeedback();
                        renderList();
                        new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3').play().catch(()=>{});
                        
                        lastScanTime = now;
                    }
                );
                document.getElementById('start-btn').style.display = 'none';
                setTimeout(checkTorch, 1000);
            } catch (err) {
                alert("Ошибка камеры. Проверьте HTTPS.");
            }
        }

        function triggerVisualFeedback() {
            document.body.classList.add('flash-active');
            setTimeout(() => { document.body.classList.remove('flash-active'); }, 150);
        }

        function renderList() {
            const list = document.getElementById('scanned-codes');
            list.innerHTML = '';
            [...codes].reverse().forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="code-text">${item.text}</span>
                    <span class="time-text">🕒 ${item.date} | ${item.time}</span>
                `;
                list.appendChild(li);
            });
            document.getElementById('count').innerText = codes.length;
        }

        function copyToClipboard() {
            if (!codes.length) return;
            const body = codes.map(c => c.text).join('\n');
            navigator.clipboard.writeText(body).then(() => { alert("Коды скопированы"); });
        }

        function clearList() {
            if (confirm("Удалить всё?")) {
                codes = [];
                localStorage.removeItem('wb_codes_v6');
                renderList();
            }
        }

        function checkTorch() {
            try {
                const track = html5QrCode.getRunningTrackCapabilities();
                if (track && track.torch) document.getElementById('torch-button').style.display = 'block';
            } catch(e) {}
        }

        async function toggleTorch() {
            const btn = document.getElementById('torch-button');
            const isOff = btn.innerText.includes("ФОНАРИК");
            try {
                await html5QrCode.applyVideoConstraints({ advanced: [{ torch: isOff }] });
                btn.innerText = isOff ? "❌ ВЫКЛЮЧИТЬ" : "🔦 ФОНАРИК";
            } catch(e) {}
        }
    </script>
</body>
</html>
