<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scanner Warehouse Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --glass-bg: rgba(28, 28, 30, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-green: #30d158;
            --accent-red: #ff453a;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--ios-bg);
            color: white;
            margin: 0;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.2s ease; /* Для эффекта моргания */
        }

        /* Контейнер сканера */
        .scanner-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--glass-border);
        }

        /* Стилизация внутренней рамки библиотеки */
        #reader { border: none !important; }
        #reader__scan_region svg { fill: var(--accent-green) !important; } /* Цвет уголков */
        #reader video { object-fit: cover !important; }

        /* Эффекты вспышки */
        body.flash-green { background-color: rgba(48, 209, 88, 0.5) !important; }
        body.flash-red { background-color: rgba(255, 69, 58, 0.5) !important; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
        }

        select {
            width: 100%; background: transparent; color: white;
            border: none; font-size: 18px; font-weight: 600; outline: none;
        }

        .btn-send {
            background: var(--accent-green);
            color: black; border: none; padding: 18px;
            border-radius: 16px; font-size: 17px; font-weight: 700;
            width: 100%; cursor: pointer; margin-top: 10px;
        }
        .btn-send:disabled { background: #3a3a3c; color: #8e8e93; }

        #status-display {
            text-align: center; font-size: 22px; font-weight: 700;
            margin: 15px 0; min-height: 30px; color: var(--accent-green);
        }

        .history-item {
            background: rgba(255,255,255,0.05);
            padding: 12px; border-radius: 12px; margin-bottom: 8px;
            display: flex; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .credits {
            margin-top: auto; padding: 20px 0;
            text-align: center; font-size: 11px; color: #636366;
        }
    </style>
</head>
<body onclick="initAudio()">

    <div class="glass-panel">
        <select id="route-select">
            <option value="Маршрут 8">Маршрут 8</option>
            <option value="Маршрут 948">Маршрут 948</option>
            <option value="Маршрут 942">Маршрут 942</option>
            <option value="Маршрут 944">Маршрут 944</option>
            <option value="Маршрут 18">Маршрут 18</option>
            <option value="Маршрут 946">Маршрут 946</option>
            <option value="Маршрут 943">Маршрут 943</option>
            <option value="Маршрут 919">Маршрут 919</option>
            <option value="Маршрут 943">Маршрут 945</option>
        </select>
    </div>

    <div class="scanner-container">
        <div id="reader"></div>
    </div>

    <div id="status-display">Готов к работе</div>

    <button class="btn-send" id="send-btn" onclick="sendData()">
        Отправить данные (0)
    </button>

    <div id="history-box" style="margin-top: 20px; flex-grow: 1;"></div>

    <div class="credits">
        © 2026 Developed by D. Martinkevich<br>for Sofrino KBT
    </div>

<script>
    let routesStore = {};
    for(let i=1; i<=9; i++) { routesStore[`Маршрут ${i}`] = []; }
    
    let lastScannedCode = null;
    let audioContext = null;
    let isSending = false;

    // Инициализация звука (нужно для iOS)
    function initAudio() {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === 'suspended') audioContext.resume();
    }

    function playBeep() {
        if (!audioContext) return;
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.frequency.setValueAtTime(1000, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioContext.destination);
        osc.start(); osc.stop(audioContext.currentTime + 0.1);
    }

    function screenFlash(type) {
        document.body.classList.add('flash-' + type);
        setTimeout(() => document.body.classList.remove('flash-' + type), 250);
    }

    function onScanSuccess(decodedText) {
        if (isSending) return;

        let cleanId = decodedText.trim();
        if (cleanId.includes(':')) {
            const parts = cleanId.split(':');
            cleanId = parts[2] || cleanId;
        }

        const currentRoute = document.getElementById('route-select').value;
        const status = document.getElementById('status-display');

        // Проверка на дубликат в текущем маршруте
        if (routesStore[currentRoute].some(item => item.id === cleanId)) {
            if (lastScannedCode !== cleanId) {
                screenFlash('red');
                status.textContent = 'ДУБЛИКАТ';
                status.style.color = 'var(--accent-red)';
                lastScannedCode = cleanId;
            }
            return;
        }

        // Успешный новый скан
        lastScannedCode = cleanId;
        playBeep();
        screenFlash('green');
        
        status.textContent = cleanId;
        status.style.color = 'var(--accent-green)';
        
        if (navigator.vibrate) navigator.vibrate(50);

        routesStore[currentRoute].unshift({
            id: cleanId,
            time: new Date().toLocaleTimeString().slice(0, 5)
        });

        updateInterface();
    }

    function updateInterface() {
        const route = document.getElementById('route-select').value;
        const container = document.getElementById('history-box');
        const list = routesStore[route];
        
        container.innerHTML = list.length > 0 ? '<h4 style="color:#8e8e93; margin:0 0 10px 5px">ИСТОРИЯ</h4>' : '';
        list.forEach(item => {
            container.innerHTML += `
                <div class="history-item">
                    <span style="font-weight:600">${item.id}</span>
                    <span style="color:#8e8e93">${item.time}</span>
                </div>`;
        });

        const btn = document.getElementById('send-btn');
        btn.textContent = `Отправить ${route} (${list.length})`;
        btn.disabled = list.length === 0 || isSending;
    }

    async function sendData() {
        const route = document.getElementById('route-select').value;
        const dataToSend = routesStore[route];
        const status = document.getElementById('status-display');
        
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyYdqLYYn0z6m8UgpS6mpWtw199xB0Eqbm6Oc2fI8haklkhd3ajBuI4Tu_OHvaopwb0/exec'; // <--- ВСТАВЬ СВОЙ URL ИЗ GOOGLE APPS SCRIPT

        isSending = true;
        updateInterface();
        status.textContent = 'Отправка...';

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ route: route, data: dataToSend })
            });

            routesStore[route] = [];
            lastScannedCode = null;
            status.textContent = 'Успешно отправлено!';
            status.style.color = 'var(--accent-green)';
        } catch (err) {
            alert('Ошибка сети! Проверьте интернет.');
            status.textContent = 'Ошибка!';
        } finally {
            isSending = false;
            updateInterface();
        }
    }

    // Запуск сканера
    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 20, 
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0,
        rememberLastUsedCamera: true
    });
    
    html5QrcodeScanner.render(onScanSuccess);

    document.getElementById('route-select').addEventListener('change', updateInterface);
</script>
</body>
</html>
