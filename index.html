<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Pro Glass Edition</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --glass-bg: rgba(28, 28, 30, 0.75);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent-green: #30d158;
            --accent-red: #ff453a;
            --laser-color: rgba(255, 69, 58, 0.8);
            --text-main: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: var(--ios-bg);
            background-image: radial-gradient(circle at 50% -20%, #1c1c1e, #000000);
            color: var(--text-main);
            margin: 0;
            padding: env(safe-area-inset-top) 15px 20px 15px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Контейнер сканера */
        .scanner-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px auto;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            background: #000;
        }

        #reader { width: 100% !important; border: none !important; }

        /* Бегающий лазер */
        .laser {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--laser-color);
            box-shadow: 0 0 15px 2px var(--laser-color);
            z-index: 10;
            pointer-events: none;
            animation: scanMove 2.5s infinite ease-in-out;
            display: none; /* Включается при работе сканера */
        }

        @keyframes scanMove {
            0% { top: 15%; opacity: 0.2; }
            50% { top: 85%; opacity: 1; }
            100% { top: 15%; opacity: 0.2; }
        }

        /* Стеклянные карточки */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 16px;
        }

        select {
            width: 100%;
            background: transparent;
            color: white;
            border: none;
            font-size: 18px;
            font-weight: 500;
            appearance: none;
            outline: none;
            text-align: center;
        }

        .btn-ios {
            display: block;
            width: 100%;
            padding: 18px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            background: var(--accent-green);
            color: #000;
            box-shadow: 0 4px 15px rgba(48, 209, 88, 0.3);
        }

        .btn-ios:active { transform: scale(0.96); opacity: 0.8; }
        .btn-ios:disabled { background: #3a3a3c; color: #8e8e93; box-shadow: none; }

        #result-badge {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 40px;
            margin: 10px 0;
            font-size: 20px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .time-tag { color: #8e8e93; font-size: 13px; font-family: monospace; }
        
        /* Вспышки */
        .flash-success { background-color: rgba(48, 209, 88, 0.15) !important; }
        .flash-error { background-color: rgba(255, 69, 58, 0.15) !important; }

        .dup-alert { color: var(--accent-red); animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <select id="route-select">
            <option value="Маршрут 8">Маршрут 8</option>
            <option value="Маршрут 942">Маршрут 942</option>
            <option value="Маршрут 943">Маршрут 943</option>
            <option value="Маршрут 944">Маршрут 944</option>
            <option value="Маршрут 18">Маршрут 18</option>
            <option value="Маршрут 6">Маршрут 6</option>
            <option value="Маршрут 7">Маршрут 7</option>
            <option value="Маршрут 8">Маршрут 8</option>
            <option value="Маршрут 9">Маршрут 9</option>
        </select>
    </div>

    <div class="scanner-wrapper">
        <div id="reader"></div>
        <div class="laser" id="scanner-laser"></div>
    </div>
    
    <div id="result-badge">Ожидание...</div>

    <button class="btn-ios" id="submit-btn" onclick="sendDataToGoogleSheets()">
        Отправить данные
    </button>

    <div style="margin-top: 30px;">
        <div style="display:flex; justify-content: space-between; margin-bottom: 10px; align-items: center;">
            <h4 style="margin:0">История</h4>
            <span id="counter" style="color: var(--accent-green); font-weight: bold;">0</span>
        </div>
        <div id="history-list">
            </div>
    </div>

<script>
    let historyData = {};
    for(let i=1; i<=9; i++) { historyData[`Маршрут ${i}`] = []; }
    let lastScannedId = null;

    // Звук успеха (более мягкий)
    function playSuccessSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, ctx.currentTime);
            g.gain.setValueAtTime(0.05, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        } catch(e) {}
    }

    function triggerEffect(type) {
        const cls = type === 'success' ? 'flash-success' : 'flash-error';
        document.body.classList.add(cls);
        setTimeout(() => document.body.classList.remove(cls), 400);
    }

    function updateUI() {
        const r = document.getElementById('route-select').value;
        const container = document.getElementById('history-list');
        container.innerHTML = '';
        
        historyData[r].forEach(item => {
            let div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${item.id}</span> <span class="time-tag">${item.time}</span>`;
            container.appendChild(div);
        });
        
        document.getElementById('counter').textContent = historyData[r].length;
        document.getElementById('submit-btn').textContent = `Отправить ${r} (${historyData[r].length})`;
        document.getElementById('submit-btn').disabled = historyData[r].length === 0;
    }

    function onScanSuccess(decodedText) {
        // ЛОГИКА ФИЛЬТРАЦИИ ID:
        // Если текст содержит ":", разделяем и берем 3-й элемент (индекс 2)
        const parts = decodedText.split(':');
        let id = (parts.length >= 3) ? parts[2].trim() : decodedText.trim();
        
        const r = document.getElementById('route-select').value;
        const badge = document.getElementById('result-badge');

        const exists = historyData[r].some(item => item.id === id);

        if (exists) {
            if (lastScannedId !== id) { 
                triggerEffect('error');
                badge.innerHTML = `<span class="dup-alert">ДУБЛИКАТ</span>`;
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                lastScannedId = id; 
            }
            return;
        }

        lastScannedId = id;
        triggerEffect('success');
        playSuccessSound();
        
        historyData[r].unshift({ id: id, time: new Date().toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'}) });
        updateUI();
        
        badge.style.color = 'var(--accent-green)';
        badge.textContent = id;
        if (navigator.vibrate) navigator.vibrate(40);
    }

    async function sendDataToGoogleSheets() {
        const r = document.getElementById('route-select').value;
        const currentRouteData = historyData[r];
        if (currentRouteData.length === 0) return;

        const btn = document.getElementById('submit-btn');
        const badge = document.getElementById('result-badge');
        
        btn.disabled = true;
        btn.textContent = 'Сохранение...';

        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwiDuT4Vk6l2tIv2kBMbeqbgcEyC_f-jicNTxLgdTbKed-qhha3sWdVHwaARj3uTljQ/exec'; 

        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify({ route: r, data: currentRouteData })
            });

            const result = await response.json();
            if (result.status === 'success') {
                historyData[r] = []; 
                updateUI();
                lastScannedId = null;
                badge.textContent = 'Успешно отправлено';
                setTimeout(() => { badge.textContent = 'Ожидание...'; }, 2000);
            }
        } catch (error) {
            alert('Ошибка сети');
            btn.disabled = false;
        }
    }

    // Запуск
    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 25, 
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0,
        showTorchButtonIfSupported: true
    });

    html5QrcodeScanner.render(onScanSuccess);

    // Включаем лазер при старте
    setTimeout(() => {
        const laser = document.getElementById('scanner-laser');
        if(laser) laser.style.display = 'block';
    }, 1000);

    document.getElementById('route-select').addEventListener('change', updateUI);
    updateUI();
</script>
</body>
</html>
