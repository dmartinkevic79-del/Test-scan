<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WB Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg-color: #000;
            --accent-blue: #00d4ff;
            --accent-green: #2ecc71;
            --text-main: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.12);
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Сканнер */
        .scanner-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            background: #050505;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        #reader { width: 100%; }

        /* Синий лазер — стал заметнее */
        .scanner-laser {
            position: absolute;
            top: 25%;
            left: 15%;
            width: 70%;
            height: 2px;
            background: rgba(0, 212, 255, 0.4); 
            box-shadow: 0 0 12px 2px rgba(0, 212, 255, 0.5); 
            z-index: 10;
            display: none;
            pointer-events: none;
            animation: scanning 3.5s infinite ease-in-out; 
        }

        @keyframes scanning {
            0% { top: 25%; }
            50% { top: 75%; }
            100% { top: 25%; }
        }

        /* Анимация переливающегося градиента */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .controls { display: flex; flex-direction: column; gap: 16px; margin-top: 25px; }
        
        button { 
            padding: 20px; 
            border-radius: 20px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 15px; 
            transition: all 0.3s ease; 
            text-transform: uppercase; 
            position: relative;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #fff;
            letter-spacing: 1px;
            background-size: 200% 200%;
            animation: gradientShift 5s infinite ease;
        }

        button:active { transform: scale(0.96); filter: brightness(1.2); }

        /* Градиенты с анимацией */
        .btn-start { 
            background-image: linear-gradient(135deg, #6e2796, #a64dff, #6e2796);
            border-color: rgba(166, 77, 255, 0.4);
            box-shadow: 0 8px 25px rgba(110, 39, 150, 0.3);
        }

        .btn-copy { 
            background-image: linear-gradient(135deg, #1e8449, #2ecc71, #1e8449);
            border-color: rgba(46, 204, 113, 0.4);
            box-shadow: 0 8px 25px rgba(30, 132, 73, 0.3);
        }

        .btn-clear { 
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #888;
            margin-top: 5px;
            animation: none; /* Для очистки статика лучше */
        }

        .btn-torch { 
            background: rgba(255, 255, 255, 0.1); 
            display: none; 
            animation: none;
        }

        /* Список */
        #list-container { 
            margin-top: 25px; 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 28px; 
            padding: 24px; 
            border: 1px solid var(--glass-border);
        }

        .status-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .count-value { color: var(--accent-green); font-size: 34px; font-weight: 900; text-shadow: 0 0 15px rgba(46, 204, 113, 0.4); }
        
        ul { list-style: none; padding: 0; margin-top: 15px; }
        li { padding: 18px 0; border-top: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .code-text { font-size: 18px; font-weight: 600; color: #eee; }
        .time-text { font-size: 12px; color: #555; }

        /* Вспышка */
        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 212, 255, 0.2); /* Вспышка теперь тоже в цвет лазера */
            z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.1s;
        }
        .flash-active { opacity: 1 !important; }

        .footer { 
            text-align: center; font-size: 11px; color: #aaa; /* Сделал еще читаемее */
            margin: 45px 0 25px 0; text-transform: uppercase; 
            letter-spacing: 2px; font-weight: 700;
        }
    </style>
</head>
<body>
    <div id="flash-overlay"></div>
    
    <div id="status-overlay" style="position: fixed; top: 25%; left: 50%; transform: translate(-50%, -50%); background: #f1c40f; color: #000; padding: 16px 32px; border-radius: 50px; font-weight: 900; z-index: 10000; display: none;">⚠️ УЖЕ В СПИСКЕ</div>

    <div class="scanner-wrapper">
        <div id="reader"></div>
        <div id="laser" class="scanner-laser"></div>
    </div>

    <div class="controls">
        <button id="start-btn" class="btn-start" onclick="initScanner()">🚀 ЗАПУСТИТЬ СКАНЕР</button>
        <button id="torch-button" class="btn-torch" onclick="toggleTorch()">🔦 ФОНАРИК</button>
        <button class="btn-copy" onclick="copyToClipboard()">📋 КОПИРОВАТЬ СПИСОК</button>
        <button class="btn-clear" onclick="clearList()">🗑️ ОЧИСТИТЬ СПИСОК</button>
    </div>

    <div id="list-container">
        <div class="status-bar">
            <span style="color: #666; font-weight: 800; font-size: 12px;">ОБРАБОТАНО КО
