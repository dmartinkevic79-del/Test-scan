<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Складской Сканер</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 10px; margin: 0; transition: background-color 0.2s; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto 15px auto; }
        .controls { text-align: center; margin-bottom: 15px; }
        select, button { padding: 12px; font-size: 16px; margin: 5px; width: 90%; max-width: 400px; border-radius: 8px; }
        button.send-btn { background-color: #4CAF50; color: white; border: none; font-weight: bold; }
        #result { font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 10px; height: 25px;}
        ul { list-style-type: none; padding: 0; }
        li { padding: 8px; border-bottom: 1px solid #ddd; font-size: 14px; }
        
        /* Стили для вспышек экрана */
        .flash-green { background-color: rgba(0, 255, 0, 0.4) !important; }
        .flash-red { background-color: rgba(255, 0, 0, 0.4) !important; }
    </style>
</head>
<body>

    <div class="controls">
        <select id="route-select">
            <option value="Маршрут 1">Маршрут 1</option>
            <option value="Маршрут 2">Маршрут 2</option>
        </select>
    </div>

    <div id="reader"></div>
    <div id="result">Ожидание сканирования...</div>

    <div class="controls">
        <button class="send-btn" onclick="sendDataToGoogleSheets()">Отправить в таблицу</button>
    </div>

    <h3>История сканирования:</h3>
    <ul id="history-list"></ul>

<script>
    let historyData = { "Маршрут 1": [], "Маршрут 2": [] };
    let lastScannedId = null;
    let html5QrcodeScanner;

    // Звук только для успешного сканирования
    function playSuccessBeep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (ctx.state === 'suspended') ctx.resume(); 
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            gain.gain.value = 0.1;
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(ctx.currentTime); 
            osc.stop(ctx.currentTime + 0.1);
        } catch(e) { console.error("Audio error", e); }
    }

    // Функция моргания экраном
    function triggerFlash(colorClass) {
        document.body.classList.add(colorClass);
        setTimeout(() => { document.body.classList.remove(colorClass); }, 300);
    }

    // Отрисовка истории на экране
    function updateHistoryUI() {
        const r = document.getElementById('route-select').value;
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        historyData[r].forEach(item => {
            let li = document.createElement('li');
            li.textContent = `ID: ${item.id} | Время: ${item.time}`;
            list.appendChild(li);
        });
    }

    document.getElementById('route-select').addEventListener('change', updateHistoryUI);

    function onScanSuccess(decodedText) {
        const parts = decodedText.split(':');
        const id = (parts.length >= 3 ? parts[2] : decodedText).trim();
        const r = document.getElementById('route-select').value;
        const resultDisplay = document.getElementById('result');

        const exists = historyData[r].some(item => item.id === id);

        if (exists) {
            // ДУБЛИКАТ: Моргает красным, БЕЗ звука
            if (lastScannedId !== id) { 
                triggerFlash('flash-red');
                resultDisplay.innerHTML = `<span style="color:red">ДУБЛИКАТ: ${id}</span>`;
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                lastScannedId = id; 
            }
            return;
        }

        // НОВЫЙ КОД: Моргает зеленым, издает звук
        lastScannedId = id;
        triggerFlash('flash-green');
        playSuccessBeep();
        
        // Фиксируем время
        historyData[r].unshift({ id: id, time: new Date().toLocaleTimeString().slice(0, 5) });
        updateHistoryUI();
        
        resultDisplay.innerHTML = `ID: ${id} (Успешно)`;
        if (navigator.vibrate) navigator.vibrate(100);
    }

    // Отправка в Google
    async function sendDataToGoogleSheets() {
        const r = document.getElementById('route-select').value;
        const dataToSend = historyData[r];

        if (dataToSend.length === 0) return alert('Нет данных для отправки');

        const btn = document.querySelector('.send-btn');
        btn.textContent = 'Отправка...';
        btn.disabled = true;

        const payload = { route: r, data: dataToSend };
        
        // ВСТАВЬТЕ СЮДА ВАШУ ССЫЛКУ ИЗ GOOGLE APPS SCRIPT!
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwiDuT4Vk6l2tIv2kBMbeqbgcEyC_f-jicNTxLgdTbKed-qhha3sWdVHwaARj3uTljQ/exec'; 

        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            if (result.status === 'success') {
                alert('Данные успешно отправлены в таблицу!');
                historyData[r] = []; // Очищаем историю после отправки
                updateHistoryUI();
            } else {
                alert('Ошибка: ' + result.message);
            }
        } catch (error) {
            alert('Не удалось отправить данные. Проверьте интернет.');
        } finally {
            btn.textContent = 'Отправить в таблицу';
            btn.disabled = false;
        }
    }

    // Запуск камеры
    html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
    html5QrcodeScanner.render(onScanSuccess);
</script>
</body>
</html>
