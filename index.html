<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOFRINOKBT Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #00ffcc; --error: #ff6b6b; --bg: #0f0f1a; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        #reader-wrapper { position: relative; width: 320px; height: 320px; margin-top: 20px; border-radius: 20px; overflow: hidden; border: 2px solid rgba(255,255,255,0.1); }
        #reader { width: 100% !important; }
        #start-btn { position: absolute; z-index: 10; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 15px 25px; background: var(--primary); border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
        
        #custom-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 280px; border: 2px solid var(--primary); z-index: 5; pointer-events: none; box-shadow: 0 0 0 500px rgba(0,0,0,0.5); }
        
        .controls { width: 90%; max-width: 360px; margin-top: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; backdrop-filter: blur(10px); }
        .result-display { padding: 15px; background: #000; border-radius: 10px; text-align: center; font-size: 1.2rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
        .duplicate { color: var(--error); animation: shake 0.3s; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
        
        select, .send-btn { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: none; font-size: 1rem; font-weight: bold; }
        .send-btn { background: var(--primary); cursor: pointer; }
        
        .history-item { background: rgba(255,255,255,0.1); margin-top: 10px; padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { color: var(--error); padding: 5px 10px; cursor: pointer; }
        .copyright { margin: 20px; font-size: 0.7rem; opacity: 0.6; font-weight: bold; }
    </style>
</head>
<body>

<div id="reader-wrapper">
    <button id="start-btn" onclick="startScanner()">ЗАПУСТИТЬ СКАНЕР</button>
    <div id="reader"></div>
    <div id="custom-overlay"></div>
</div>

<div class="controls">
    <div id="result" class="result-display">ГОТОВ К РАБОТЕ</div>
    <select id="route-select" onchange="updateUI()">
        <option value="1">Маршрут №1</option><option value="2">Маршрут №2</option><option value="3">Маршрут №3</option>
        <option value="4">Маршрут №4</option><option value="5">Маршрут №5</option><option value="6">Маршрут №6</option>
    </select>
    <button id="send-btn" class="send-btn" onclick="sendToGoogle()">ОТПРАВИТЬ В ТАБЛИЦУ</button>
</div>

<div id="history-list" style="width: 90%; max-width: 360px;"></div>

<div class="copyright">DEVELOPED BY D. MARTINKEVICH FOR SOFRINOKBT</div>

<script>
    // СЮДА ВСТАВЬТЕ ССЫЛКУ ИЗ GOOGLE (DEPLOY)
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwLqHc5fVq6KXTV-skVYhZmTigQ49lLCGGDmzgAfA5dHehOKWsX-KJp-sfPktm7QTdP7A/exec';

    let historyData = JSON.parse(localStorage.getItem('sofrinoData')) || {1:[],2:[],3:[],4:[],5:[],6:[]};
    let lastId = null;
    const html5QrCode = new Html5Qrcode("reader");

    async function startScanner() {
        document.getElementById('start-btn').style.display = 'none';
        const config = { fps: 20, qrbox: { width: 280, height: 280 } };
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
        if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
    }

    function onScanSuccess(decodedText) {
        const parts = decodedText.split(':');
        const id = (parts.length >= 3 ? parts[2] : decodedText).trim();
        const route = document.getElementById('route-select').value;
        const resDiv = document.getElementById('result');

        if (historyData[route].some(item => item.id === id)) {
            if (lastId !== id) {
                resDiv.innerText = "ДУБЛИКАТ: " + id;
                resDiv.classList.add('duplicate');
                playBeep(false);
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                lastId = id;
            }
            return;
        }

        lastId = id;
        resDiv.innerText = id;
        resDiv.classList.remove('duplicate');
        playBeep(true);
        if (navigator.vibrate) navigator.vibrate(100);

        historyData[route].unshift({ id: id, time: new Date().toLocaleTimeString().slice(0,5) });
        save();
    }

    function save() {
        localStorage.setItem('sofrinoData', JSON.stringify(historyData));
        updateUI();
    }

    function updateUI() {
        const route = document.getElementById('route-select').value;
        const list = document.getElementById('history-list');
        list.innerHTML = historyData[route].map((item, idx) => `
            <div class="history-item">
                <span>${item.id} <small>(${item.time})</small></span>
                <span class="del-btn" onclick="deleteItem(${idx})">❌</span>
            </div>
        `).join('');
    }

    function deleteItem(idx) {
        const route = document.getElementById('route-select').value;
        historyData[route].splice(idx, 1);
        save();
    }

    function playBeep(success) {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.frequency.value = success ? 800 : 200;
        g.gain.value = 0.1;
        osc.connect(g); g.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + (success ? 0.1 : 0.3));
    }

    function sendToGoogle() {
        const route = document.getElementById('route-select').value;
        const codes = historyData[route].map(i => i.id).join(', ');
        if (!codes) return alert("Список пуст");

        const btn = document.getElementById('send-btn');
        btn.innerText = "ОТПРАВКА..."; btn.disabled = true;

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ value: codes, route: route })
        }).then(() => {
            alert("Данные за " + route + " маршрут отправлены!");
            btn.innerText = "ОТПРАВИТЬ В ТАБЛИЦУ"; btn.disabled = false;
        }).catch(() => {
            alert("Ошибка сети");
            btn.innerText = "ОТПРАВИТЬ В ТАБЛИЦУ"; btn.disabled = false;
        });
    }

    updateUI();
</script>
</body>
</html>
