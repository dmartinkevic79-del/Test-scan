<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Scanner - SOFRINOKBT</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-color: #00ffcc;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Контейнер камеры */
        #reader-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin-top: 20px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            background: #000;
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
        }

        /* Рамка 280x280 */
        #custom-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            border: 2px solid var(--primary-color);
            pointer-events: none;
            z-index: 10;
            box-sizing: border-box;
            box-shadow: 0 0 0 500px rgba(0, 0, 0, 0.5); /* Затемнение вокруг */
        }

        /* Лазерная линия */
        #laser {
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-color);
            top: 0;
            left: 0;
            animation: scanLine 2s infinite linear;
        }

        @keyframes scanLine {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        /* Панель управления */
        .controls {
            width: 90%;
            max-width: 350px;
            margin-top: 25px;
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            text-align: center;
        }

        .result-display {
            font-size: 1.1rem;
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            min-height: 20px;
            color: var(--primary-color);
            font-weight: bold;
        }

        .glass-select, .glass-button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .glass-button {
            background: linear-gradient(135deg, rgba(0, 255, 204, 0.4), rgba(0, 153, 255, 0.4));
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .glass-button:hover:not(:disabled) {
            background: rgba(0, 255, 204, 0.6);
            transform: translateY(-2px);
        }

        .glass-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .glass-select option {
            background: #1a1a2e;
        }

        .copyright {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="reader-wrapper">
        <div id="reader"></div>
        <div id="custom-overlay">
            <div id="laser"></div>
        </div>
    </div>

    <div class="controls">
        <div id="result" class="result-display">ОЖИДАНИЕ КОДА...</div>
        
        <select id="route-select" class="glass-select">
            <option value="1">МАРШРУТ №8</option>
            <option value="2">МАРШРУТ №948</option>
            <option value="3">МАРШРУТ №942</option>
            <option value="4">МАРШРУТ №944</option>
            <option value="5">МАРШРУТ №18</option>
            <option value="6">МАРШРУТ №946</option>
            <option value="7">МАРШРУТ №943</option>
            <option value="8">МАРШРУТ №919</option>
            <option value="9">МАРШРУТ №945</option>
        </select>

        <button id="send-btn" class="glass-button">ОТПРАВИТЬ В ТАБЛИЦУ</button>
    </div>

    <div class="copyright">
        DEVELOPED BY D. MARTINKEVICH FOR SOFRINOKBT
    </div>

<script>
    // Вставьте сюда вашу ссылку из Google Apps Script
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz3wlTxGMw4miB93yAJ6efDwa_FQAazKGpvBPYlB36Nn1BKnOk_ew_Je-ZmMgpCCT5SPA/exec';
    
    let lastScannedId = null;

    function onScanSuccess(decodedText) {
        // Логика извлечения ID из середины ($1:1:ID:ДАТА)
        const parts = decodedText.split(':');
        let extractedId = decodedText;

        if (parts.length >= 3) {
            extractedId = parts[2];
        }
        
        if (lastScannedId !== extractedId) {
            lastScannedId = extractedId;
            document.getElementById('result').innerText = "ID: " + extractedId;
            // Можно добавить легкую вибрацию при сканировании
            if (navigator.vibrate) navigator.vibrate(100);
        }
    }

    // Инициализация сканера
    const html5QrCode = new Html5Qrcode("reader");
    const config = { 
        fps: 20, 
        qrbox: { width: 280, height: 280 },
        aspectRatio: 1.0
    };

    html5QrCode.start(
        { facingMode: "environment" }, 
        config, 
        onScanSuccess
    ).catch(err => console.error("Ошибка запуска камеры:", err));

    // Обработка кнопки отправки
    document.getElementById('send-btn').addEventListener('click', function() {
        const route = document.getElementById('route-select').value;
        const btn = this;

        if (!lastScannedId) {
            alert("Сначала отсканируйте штрих-код!");
            return;
        }

        btn.innerText = "ОТПРАВКА...";
        btn.disabled = true;

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                value: lastScannedId, 
                route: route 
            })
        })
        .then(() => {
            alert("Данные успешно внесены в таблицу!");
            btn.innerText = "ОТПРАВИТЬ В ТАБЛИЦУ";
            btn.disabled = false;
        })
        .catch(error => {
            console.error('Ошибка:', error);
            alert("Ошибка связи с таблицей.");
            btn.disabled = false;
            btn.innerText = "ОТПРАВИТЬ В ТАБЛИЦУ";
        });
    });
</script>
</body>
</html>
